<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiotViet E-Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; color: #334155; background-color: #f8fafc; }
        .tech-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; background: conic-gradient(at top right, #f8fafc, #f1f5f9, #e2e8f0, #f8fafc); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .nav-main-btn { transition: all 0.2s ease; border: 1px solid transparent; }
        .nav-main-btn.active { background-color: #059669; color: #ffffff; border-color: #047857; box-shadow: 0 4px 15px -3px rgba(0,0,0,0.1); }
        .nav-main-btn:not(.active):hover { background-color: #ecfdf5; color: #059669; border-color: #059669; }
        .nav-quiz-btn { transition: all 0.2s ease; border: 1px solid transparent; background-color: #f8fafc; color: #ea580c; border-color: #fed7aa; }
        .nav-quiz-btn.active { background-color: #ea580c; color: #ffffff; border-color: #c2410c; box-shadow: 0 4px 15px -3px rgba(234,88,12,0.4); transform: scale(1.02); }
        .nav-quiz-btn:not(.active):hover { background-color: #fff7ed; border-color: #ea580c; transform: scale(1.02); }
        .topic-item { transition: all 0.2s; border-left: 3px solid transparent; }
        .topic-item:hover { background-color: #f8fafc; color: #ea580c; }
        .topic-item.active { background-color: #f1f5f9; color: #ea580c; border-left-color: #ea580c; font-weight: 700; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #94a3b8; border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; margin: 0 2px; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col h-[100dvh]">

    <div class="tech-bg"></div>

    <header class="shrink-0 bg-[#ea580c] border-b border-[#c2410c] shadow-sm py-2 sm:py-3 px-4 sm:px-6 z-50">
        <div class="container mx-auto flex justify-between items-center max-w-[1400px]">
            <div class="flex items-center gap-3 sm:gap-4 select-none">
                <img src="https://logo.kiotviet.vn/KiotViet-Logo-Horizontal.svg" alt="KiotViet Logo" class="h-6 sm:h-8" style="filter: brightness(0) invert(1);">
                <span class="text-white/30 font-light text-xl lg:text-2xl hidden sm:inline">|</span>
                <div class="hidden sm:block">
                    <h1 class="text-base sm:text-lg font-bold text-white tracking-tight uppercase leading-tight">E-Learning</h1>
                    <p class="text-[10px] sm:text-xs text-white/80 font-semibold tracking-wide mt-0.5">Quản lý Phòng/bàn</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-white/20 border border-white/30 px-3 sm:px-4 py-1.5 rounded-full flex items-center gap-1.5 sm:gap-2 shadow-sm backdrop-blur-sm">
                    <i class="fa-solid fa-utensils text-white"></i>
                    <span class="text-white font-bold text-xs sm:text-sm tracking-wide hidden xs:inline">F&B</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 container mx-auto px-2 sm:px-4 py-3 sm:py-4 max-w-[1400px] flex flex-col md:flex-row overflow-hidden gap-3 sm:gap-4 relative">
        <div class="shrink-0 w-full md:w-64 lg:w-72 bg-white/90 backdrop-blur-md rounded-xl shadow-sm border border-slate-200 flex flex-col z-30 overflow-hidden order-2 md:order-1 max-h-[40vh] md:max-h-full">
            <div class="flex p-3 sm:p-4 gap-2 border-b border-slate-100 shrink-0">
                <button onclick="switchMainTab('ly-thuyet')" id="btn-ly-thuyet" class="nav-main-btn active flex-1 py-2 sm:py-2.5 rounded-lg font-bold text-xs sm:text-sm flex flex-col items-center justify-center gap-1 text-center shadow-sm">
                    <i class="fa-solid fa-book-open-reader text-base"></i> Bài học
                </button>
                <button onclick="switchMainTab('mo-phong')" id="btn-mo-phong" class="nav-main-btn bg-slate-50 text-slate-600 border-slate-200 flex-1 py-2 sm:py-2.5 rounded-lg font-bold text-xs sm:text-sm flex flex-col items-center justify-center gap-1 text-center shadow-sm">
                    <i class="fa-regular fa-comments text-base"></i> Mô phỏng
                </button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar p-2" id="sidebar-topic-list"></div>
            <div class="p-3 sm:p-4 border-t border-slate-100 shrink-0 bg-slate-50/50">
                <button onclick="switchMainTab('kiem-tra')" id="btn-kiem-tra" class="nav-quiz-btn w-full py-3 rounded-xl font-black text-sm flex items-center justify-center gap-2 shadow-sm">
                    <i class="fa-solid fa-brain text-lg"></i> Kiểm tra Kiến thức
                </button>
            </div>
        </div>

        <div id="main-content-container" class="flex-1 overflow-hidden flex flex-col bg-white/80 backdrop-blur-md rounded-xl shadow-sm border border-slate-200 relative order-1 md:order-2">
            <div id="learning-content-wrapper" class="flex-1 flex flex-col overflow-hidden">
                <div class="shrink-0 px-4 sm:px-6 py-3 border-b border-slate-200/60 flex justify-between items-center bg-white z-10 shadow-sm gap-3">
                    <div class="flex items-center gap-3">
                        <span id="content-header-icon" class="text-xl sm:text-2xl text-orange-500">💡</span>
                        <h2 id="content-header-title" class="text-base sm:text-xl font-bold text-slate-800 truncate">Tiêu đề</h2>
                    </div>
                    <div class="flex md:hidden gap-2">
                        <button onclick="changeTopic(-1)" id="btn-prev-mobile" class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center disabled:opacity-30"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="changeTopic(1)" id="btn-next-mobile" class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center disabled:opacity-30"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div id="content-body" class="flex-1 overflow-y-auto custom-scrollbar relative flex flex-col bg-slate-50/30"></div>
            </div>

            <div id="sec-kiem-tra" class="hidden flex-1 overflow-y-auto custom-scrollbar p-4 sm:p-8 bg-slate-50/50">
                <div class="max-w-4xl mx-auto flex flex-col h-full relative w-full">
                    <div class="text-center mb-6 shrink-0 bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-200">
                        <div class="w-16 h-16 bg-orange-100 text-orange-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-inner border border-orange-200"><i class="fa-solid fa-brain"></i></div>
                        <h2 class="text-xl sm:text-3xl font-black text-slate-800">Thử thách: Sự thật vs Lầm tưởng</h2>
                        <p class="text-sm sm:text-base text-slate-500 mt-2 font-medium">Đọc kỹ các nhận định dưới đây và xác định xem nó là Đúng hay Sai nhé!</p>
                    </div>
                    <div id="quiz-container" class="space-y-4 sm:space-y-6 pb-20"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="quiz-result-popup" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] hidden items-center justify-center p-4 transition-opacity opacity-0">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center transform scale-95 transition-transform" id="quiz-popup-content">
            <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-4"><i class="fa-solid fa-trophy"></i></div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Tuyệt vời!</h3>
            <p class="text-slate-600 mb-6 font-medium">Bạn đã hoàn thành bài kiểm tra với số điểm <br><strong class="text-3xl text-green-600 block mt-2" id="quiz-score-display">0/0</strong></p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeQuizPopup()" class="px-6 py-2.5 bg-slate-100 text-slate-600 hover:bg-slate-200 font-bold rounded-xl transition-colors">Đóng lại</button>
                <button onclick="resetQuiz()" class="px-6 py-2.5 bg-[#ea580c] text-white hover:opacity-90 font-bold rounded-xl transition-opacity shadow-md"><i class="fa-solid fa-rotate-right mr-1"></i> Làm lại</button>
            </div>
        </div>
    </div>

    <div id="lightbox" class="fixed inset-0 bg-slate-900/95 z-[9999] hidden flex-col items-center justify-center p-4 sm:p-8 backdrop-blur-sm transition-opacity opacity-0" onclick="closeLightbox(event)">
        <button onclick="closeLightbox(event)" class="absolute top-4 right-4 sm:top-6 sm:right-6 w-10 h-10 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white text-xl transition-colors z-50 border border-white/20"><i class="fa-solid fa-xmark"></i></button>
        <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-4 sm:px-10 pointer-events-none z-40">
            <button onclick="changeLightboxImg(-1); event.stopPropagation();" class="pointer-events-auto w-12 h-12 bg-black/40 hover:bg-black/70 text-white rounded-full flex items-center justify-center transition-all backdrop-blur-sm"><i class="fa-solid fa-chevron-left"></i></button>
            <button onclick="changeLightboxImg(1); event.stopPropagation();" class="pointer-events-auto w-12 h-12 bg-black/40 hover:bg-black/70 text-white rounded-full flex items-center justify-center transition-all backdrop-blur-sm"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <img id="lightbox-img" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl transition-transform transform scale-95 bg-white z-50" onclick="event.stopPropagation();" />
        <div class="absolute bottom-6 text-white/50 text-sm font-semibold pointer-events-none bg-black/50 px-4 py-1.5 rounded-full backdrop-blur-sm z-50">Sử dụng phím mũi tên ⬅ ➡ để chuyển ảnh</div>
    </div>

        function switchMainTab(tab) {
            activeMainTab = tab;
            const btnLyThuyet = document.getElementById('btn-ly-thuyet');
            const btnMoPhong = document.getElementById('btn-mo-phong');
            const btnKiemTra = document.getElementById('btn-kiem-tra');
            
            [btnLyThuyet, btnMoPhong].forEach(btn => {
                if(btn) {
                    btn.classList.remove('active', 'bg-[#059669]', 'text-white', 'shadow-md', 'border-[#047857]');
                    btn.classList.add('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            });
            if(btnKiemTra) btnKiemTra.classList.remove('active');

            if (tab === 'kiem-tra') {
                if(btnKiemTra) btnKiemTra.classList.add('active');
            } else if (tab === 'ly-thuyet') {
                if(btnLyThuyet) {
                    btnLyThuyet.classList.add('active', 'bg-[#059669]', 'text-white', 'shadow-md', 'border-[#047857]');
                    btnLyThuyet.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            } else if (tab === 'mo-phong') {
                if(btnMoPhong) {
                    btnMoPhong.classList.add('active', 'bg-[#059669]', 'text-white', 'shadow-md', 'border-[#047857]');
                    btnMoPhong.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');

                if(unifiedData.length > 0) updateContentArea(); 
            }

            const list = document.getElementById('sidebar-topic-list');
            list.innerHTML = '';
            unifiedData.forEach((item, idx) => {
                const btn = document.createElement('button');
                const isActive = idx === currentTopic;
                const activeClasses = isActive 
                    ? 'active bg-slate-100 text-[#ea580c] border-[#ea580c] font-bold' 
                    : 'border-transparent text-slate-700 hover:bg-orange-50';
                
                btn.className = `topic-item w-full text-left px-3 py-3 mb-1 font-semibold text-sm rounded-lg flex items-center gap-3 border-l-4 ${activeClasses}`;
                btn.innerHTML = `<span class="w-5 text-center text-slate-400 shrink-0">${item.icon}</span> <span class="truncate leading-snug">${item.title}</span>`;
                btn.onclick = () => { selectTopic(idx); };
                list.appendChild(btn);
            });

            const prevMob = document.getElementById('btn-prev-mobile');
            const nextMob = document.getElementById('btn-next-mobile');
            if(prevMob) prevMob.disabled = currentTopic === 0;
            if(nextMob) nextMob.disabled = currentTopic === unifiedData.length - 1;
        }

        function changeTopic(dir) {
            const newIndex = currentTopic + dir;
            if (newIndex >= 0 && newIndex < unifiedData.length) selectTopic(newIndex);

            renderSidebarList(); updateContentArea();

                body.innerHTML = buildChatHTML(data);

                    <div class="w-1 absolute left-0 top-0 bottom-0 bg-[#ea580c]"></div>
                    <div class="bg-orange-100 text-[#ea580c] font-black w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs mt-0.5 shadow-sm border border-orange-200">${i+1}</div>
                    <div class="text-slate-700 leading-relaxed text-sm flex-1">${step}</div>
                </div>
            `).join('') : '<p class="text-sm text-slate-500 italic">Chưa có hướng dẫn chi tiết.</p>';

            let rightCol = `<div class="w-full lg:w-7/12 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col gap-3"><strong class="text-slate-800 block text-[11px] uppercase tracking-wider border-b border-slate-100 pb-2"><i class="fa-solid fa-list-check text-slate-400 mr-1"></i> Hướng dẫn thao tác:</strong><div class="flex flex-col gap-3">${stepsHtml}</div></div>`;

            let bottomRowHtml = '';
            if (data.images && data.images.length > 0) {
                let navigationHtml = '';
                if (data.images.length > 1) {
                    navigationHtml = `
                        <div class="flex justify-center items-center gap-4 mt-4">
                            <button onclick="changeLocalSlide(-1)" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-[#ea580c] hover:text-white hover:border-[#ea580c] flex items-center justify-center transition-all shadow-sm"><i class="fa-solid fa-chevron-left"></i></button>
                            <span id="local-slider-counter" class="text-sm font-bold text-slate-500 px-4 py-1.5 bg-slate-100 rounded-full border border-slate-200">1 / ${data.images.length}</span>
                            <button onclick="changeLocalSlide(1)" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-[#ea580c] hover:text-white hover:border-[#ea580c] flex items-center justify-center transition-all shadow-sm"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    `;
                }

                bottomRowHtml = `
                    <div class="w-full fade-in" style="animation-delay: 0.1s; animation-fill-mode: both;">
                        <h3 class="font-bold text-slate-800 uppercase text-xs tracking-wider mb-3 ml-1 flex items-center gap-2 border-b border-slate-200 pb-2"><i class="fa-regular fa-image text-slate-400"></i> Hình ảnh minh họa</h3>
                        <div class="relative w-full aspect-[16/9] rounded-2xl overflow-hidden bg-slate-100/50 border border-slate-200 flex items-center justify-center shadow-inner">
                            <img id="local-slider-img" src="${data.images[0]}" class="w-full h-full object-contain cursor-zoom-in bg-white" onclick="openLightbox(unifiedData[currentTopic].images, currentLocalSlideIdx)">
                        </div>
                        ${navigationHtml}
                    </div>
                `;
            }

            return `<div class="p-4 sm:p-6 lg:p-8 fade-in flex flex-col gap-6 max-w-5xl mx-auto w-full pb-20"><div class="flex flex-col lg:flex-row gap-4 sm:gap-6">${leftCol}${rightCol}</div>${bottomRowHtml}</div>`;
        }

        function changeLocalSlide(dir) {
            const data = unifiedData[currentTopic];
            if (!data || !data.images || data.images.length <= 1) return;
            const total = data.images.length;
            currentLocalSlideIdx = (currentLocalSlideIdx + dir + total) % total;
            updateLocalSliderView();
        }

        function updateLocalSliderView() {
            const data = unifiedData[currentTopic];
            if (!data || !data.images || data.images.length <= 1) return;
            const imgEl = document.getElementById('local-slider-img');
            const counter = document.getElementById('local-slider-counter');
            if (imgEl) {
                imgEl.src = data.images[currentLocalSlideIdx];
            }
            if (counter) counter.innerText = `${currentLocalSlideIdx + 1} / ${data.images.length}`;
        }

        function buildChatHTML(data) {
            if (!data.chat || data.chat.length === 0) return `<div class="p-10 flex-1 flex items-center justify-center fade-in"><div class="text-center text-slate-400 bg-white p-8 rounded-2xl border border-slate-200 shadow-sm max-w-md w-full"><i class="fa-regular fa-message text-5xl mb-4 text-slate-300"></i><h3 class="font-bold text-lg text-slate-600 mb-1">Chưa có dữ liệu</h3><p class="text-sm">Không có kịch bản mô phỏng hội thoại cho bài học này.</p></div></div>`;
            
            const userMsg = data.chat.find(m => m.r === 'customer');
            const kvMsg = data.chat.find(m => m.r === 'consultant');
            
            let chatHtml = `<div class="w-full max-w-3xl flex flex-col gap-5 bg-transparent" id="chat-simulation-container">`;
            
            if (userMsg) {
                chatHtml += `
                    <div class="flex gap-3 items-start w-[90%] sm:w-[85%] fade-in">
                        <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-white flex items-center justify-center text-sm sm:text-base shrink-0 shadow-sm border border-slate-200"><i class="fa-regular fa-user text-slate-400"></i></div>
                        <div class="bg-white border border-slate-200 p-3 sm:p-4 rounded-2xl rounded-tl-none text-sm sm:text-[15px] text-slate-700 shadow-sm leading-relaxed relative">
                            ${userMsg.t}
                        </div>
                    </div>
                `;
            }

            if (kvMsg) {
                chatHtml += `
                    <div id="bot-typing" class="flex gap-3 items-start flex-row-reverse w-[90%] sm:w-[85%] self-end fade-in">
                        <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#ea580c] flex items-center justify-center text-sm sm:text-base text-white shrink-0 shadow-sm"><i class="fa-solid fa-headset"></i></div>
                        <div class="bg-orange-50 border border-orange-200 p-3 sm:p-4 rounded-2xl rounded-tr-none shadow-sm flex items-center h-12 typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                    <div id="bot-response" class="hidden gap-3 items-start flex-row-reverse w-[90%] sm:w-[85%] self-end fade-in">
                        <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#ea580c] flex items-center justify-center text-sm sm:text-base text-white shrink-0 shadow-sm"><i class="fa-solid fa-headset"></i></div>
                        <div class="bg-orange-50 border border-orange-200 p-3 sm:p-4 rounded-2xl rounded-tr-none text-sm sm:text-[15px] text-orange-900 shadow-sm leading-relaxed">
                            ${kvMsg.t}
                        </div>
                    </div>
                `;
            }
            
            chatHtml += `</div>`;

            setTimeout(() => {
                const typing = document.getElementById('bot-typing');
                const response = document.getElementById('bot-response');
                if(typing && response) {
                    typing.classList.add('hidden'); typing.classList.remove('flex');
                    response.classList.remove('hidden'); response.classList.add('flex');
                }
            }, 1000);

            return `<div class="p-4 sm:p-6 lg:p-8 fade-in w-full h-full flex justify-center bg-slate-200/50 shadow-inner pb-20">${chatHtml}</div>`;
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        let lbImages = []; let lbIndex = 0;

        function openLightbox(imgArray, index) {
            lbImages = imgArray; lbIndex = index; lightboxImg.src = lbImages[lbIndex];
            lightbox.classList.remove('hidden'); lightbox.classList.add('flex');
            setTimeout(() => { lightbox.classList.remove('opacity-0'); lightboxImg.classList.remove('scale-95'); lightboxImg.classList.add('scale-100'); }, 10);
        }

        function closeLightbox(e) {
            if(e) e.preventDefault();
            lightbox.classList.add('opacity-0'); lightboxImg.classList.remove('scale-100'); lightboxImg.classList.add('scale-95');
            setTimeout(() => { lightbox.classList.add('hidden'); lightbox.classList.remove('flex'); }, 300);
        }

        function changeLightboxImg(dir) {
            if (lbImages.length <= 1) return;
            lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
            lightboxImg.src = lbImages[lbIndex];
        }

        document.addEventListener('keydown', function(e) {
            const isLightboxOpen = !document.getElementById('lightbox').classList.contains('hidden');
            if (isLightboxOpen) {
                if (e.key === 'ArrowLeft') changeLightboxImg(-1);
                if (e.key === 'ArrowRight') changeLightboxImg(1);
                if (e.key === 'Escape') closeLightbox();
            } else if (activeMainTab === 'ly-thuyet') {
                if (e.key === 'ArrowLeft') changeLocalSlide(-1);
                if (e.key === 'ArrowRight') changeLocalSlide(1);
            }
        });

        // --- QUIZ LOGIC ---
        function renderQuiz() {
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.innerHTML = '';
            if(quizData.length === 0) {
                quizContainer.innerHTML = '<p class="text-center text-slate-500">Chưa có dữ liệu bài kiểm tra.</p>';
                return;
            }
            
            quizData.forEach((quiz, qIndex) => {
                const qDiv = document.createElement('div');
                qDiv.className = "quiz-card bg-white p-5 sm:p-6 rounded-2xl border border-slate-200 shadow-md hover:shadow-lg transition-shadow relative overflow-hidden";
                qDiv.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-orange-400"></div>
                    <div class="bg-orange-50/50 p-4 rounded-xl border border-orange-100 mb-5">
                        <h3 class="font-bold text-sm sm:text-base text-slate-800 leading-relaxed flex items-start gap-2">
                            <span class="text-orange-600 mt-0.5 shrink-0"><i class="fa-regular fa-circle-question"></i></span>
                            <span><span class="text-orange-700 mr-1">Nhận định ${qIndex + 1}:</span> ${quiz.q}</span>
                        </h3>
                    </div>
                    <div class="flex gap-3 btn-container pl-0 sm:pl-4">
                        <button onclick="checkTF(this, ${qIndex}, true)" class="tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold hover:bg-slate-100 flex items-center justify-center gap-2"><i class="fa-solid fa-check text-lg"></i> ĐÚNG</button>
                        <button onclick="checkTF(this, ${qIndex}, false)" class="tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold hover:bg-slate-100 flex items-center justify-center gap-2"><i class="fa-solid fa-xmark text-lg"></i> SAI</button>
                    </div>
                    <div class="explain-box hidden mt-4 ml-0 sm:ml-4 p-4 rounded-xl text-sm fade-in shadow-inner"></div>
                `;
                quizContainer.appendChild(qDiv);
            });
        }

        function checkTF(btn, qIndex, selectedAnswer) {
            const card = btn.closest('.quiz-card');
            const isCorrect = quizData[qIndex].isTrue === selectedAnswer;
            const explainBox = card.querySelector('.explain-box');
            
            card.classList.add('card-solved'); 
            
            const btns = card.querySelectorAll('.tf-btn');
            btns.forEach(b => {
                b.className = "tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-slate-200 bg-slate-100 text-slate-400 font-bold flex items-center justify-center gap-2 pointer-events-none";
            });

            if (isCorrect) {
                btn.className = "tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-green-500 bg-green-500 text-white font-bold flex items-center justify-center gap-2 pointer-events-none shadow-md";
                explainBox.className = "explain-box mt-4 ml-0 sm:ml-4 p-4 rounded-xl bg-green-50 border border-green-200 text-sm text-green-900 fade-in shadow-inner";
                explainBox.innerHTML = `<strong class="block mb-1 text-green-700"><i class="fa-solid fa-circle-check"></i> Chính xác!</strong> ${quizData[qIndex].explain}`;
                window.quizScore = (window.quizScore || 0) + 1;
            } else {
                btn.className = "tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-red-500 bg-red-500 text-white font-bold flex items-center justify-center gap-2 pointer-events-none shadow-md";
                explainBox.className = "explain-box mt-4 ml-0 sm:ml-4 p-4 rounded-xl bg-green-50 border border-green-200 text-sm text-green-900 fade-in shadow-inner";
                explainBox.innerHTML = `<strong class="block mb-1 text-red-700"><i class="fa-solid fa-triangle-exclamation"></i> Rất tiếc, chưa đúng!</strong> ${quizData[qIndex].explain}`;
                
                const correctBtnIdx = quizData[qIndex].isTrue ? 0 : 1;
                btns[correctBtnIdx].classList.add('border-green-400', 'text-green-600', 'bg-green-50');
            }
            explainBox.classList.remove('hidden');

            window.quizAnswered = (window.quizAnswered || 0) + 1;
            if(window.quizAnswered === quizData.length) {
                 setTimeout(() => showQuizResultPopup(), 600);
            }
        }

        function showQuizResultPopup() {
            const popup = document.getElementById('quiz-result-popup');
            const scoreDisplay = document.getElementById('quiz-score-display');
            const content = document.getElementById('quiz-popup-content');
            
            scoreDisplay.innerText = window.quizScore + ' / ' + quizData.length;
            popup.classList.remove('hidden'); popup.classList.add('flex');
            
            setTimeout(() => {
                popup.classList.remove('opacity-0');
                content.classList.remove('scale-95'); content.classList.add('scale-100');
            }, 10);
        }

        function closeQuizPopup() {
            const popup = document.getElementById('quiz-result-popup');
            const content = document.getElementById('quiz-popup-content');
            
            popup.classList.add('opacity-0');
            content.classList.remove('scale-100'); content.classList.add('scale-95');
            
            setTimeout(() => {
                popup.classList.add('hidden'); popup.classList.remove('flex');
            }, 300);
        }

        function resetQuiz() {
            closeQuizPopup();
            window.quizScore = 0; window.quizAnswered = 0;
            renderQuiz();
            document.getElementById('sec-kiem-tra').scrollTop = 0;
        }
    </script>
</body>
</html>
