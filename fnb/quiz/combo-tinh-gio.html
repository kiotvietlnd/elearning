            const btnKiemTra = document.getElementById('btn-kiem-tra');
            
            [btnLyThuyet, btnMoPhong].forEach(btn => {

                    btn.classList.remove('active', 'bg-[#ea580c]', 'text-white', 'shadow-md', 'border-[#c2410c]');
                    btn.classList.add('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            });
            if(btnKiemTra) btnKiemTra.classList.remove('active');

            if (tab === 'kiem-tra') {
                if(btnKiemTra) btnKiemTra.classList.add('active');
            } else if (tab === 'ly-thuyet') {
                if(btnLyThuyet) {
                    btnLyThuyet.classList.add('active', 'bg-[#ea580c]', 'text-white', 'shadow-md', 'border-[#c2410c]');
                    btnLyThuyet.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');

                    : 'border-transparent text-slate-700 hover:bg-orange-50';
                
                btn.className = `topic-item w-full text-left px-3 py-3 mb-1 font-semibold text-sm rounded-lg flex items-center gap-3 border-l-4 ${activeClasses}`;

                btn.onclick = () => { selectTopic(idx); };
                list.appendChild(btn);
            });

            const prevMob = document.getElementById('btn-prev-mobile');
            const nextMob = document.getElementById('btn-next-mobile');
            if(prevMob) prevMob.disabled = currentTopic === 0;
            if(nextMob) nextMob.disabled = currentTopic === unifiedData.length - 1;
        }

            const newIndex = currentTopic + dir;
            if (newIndex >= 0 && newIndex < unifiedData.length) selectTopic(newIndex);

                bottomRowHtml = `
                    <div class="w-full fade-in" style="animation-delay: 0.1s; animation-fill-mode: both;">
                        <h3 class="font-bold text-slate-800 uppercase text-xs tracking-wider mb-3 ml-1 flex items-center gap-2 border-b border-slate-200 pb-2"><i class="fa-regular fa-image text-slate-400"></i> Hình ảnh minh họa</h3>
                        <div class="relative w-full aspect-[16/9] rounded-2xl overflow-hidden bg-slate-100/50 border border-slate-200 flex items-center justify-center shadow-inner">
                            <img id="local-slider-img" src="${data.images[0]}" class="w-full h-full object-contain cursor-zoom-in bg-white" onclick="openLightbox(unifiedData[currentTopic].images, currentLocalSlideIdx)">
                        </div>
                        ${navigationHtml}
                    </div>
                `;
            }

            return `<div class="p-4 sm:p-6 lg:p-8 fade-in flex flex-col gap-6 max-w-5xl mx-auto w-full pb-20"><div class="flex flex-col lg:flex-row gap-4 sm:gap-6">${leftCol}${rightCol}</div>${bottomRowHtml}</div>`;
        }

        function changeLocalSlide(dir) {
            const data = unifiedData[currentTopic];
            if (!data || !data.images || data.images.length <= 1) return;
            const total = data.images.length;
            currentLocalSlideIdx = (currentLocalSlideIdx + dir + total) % total;
            updateLocalSliderView();
        }

        function updateLocalSliderView() {
            const data = unifiedData[currentTopic];
            if (!data || !data.images || data.images.length <= 1) return;
            const imgEl = document.getElementById('local-slider-img');
            const counter = document.getElementById('local-slider-counter');
            if (imgEl) {
                imgEl.src = data.images[currentLocalSlideIdx];
            }
            if (counter) counter.innerText = `${currentLocalSlideIdx + 1} / ${data.images.length}`;
        }

        function buildChatHTML(data) {
            if (!data.chat || data.chat.length === 0) return `<div class="p-10 flex-1 flex items-center justify-center fade-in"><div class="text-center text-slate-400 bg-white p-8 rounded-2xl border border-slate-200 shadow-sm max-w-md w-full"><i class="fa-regular fa-message text-5xl mb-4 text-slate-300"></i><h3 class="font-bold text-lg text-slate-600 mb-1">Chưa có dữ liệu</h3><p class="text-sm">Không có kịch bản mô phỏng hội thoại cho bài học này.</p></div></div>`;
            
            const userMsg = data.chat.find(m => m.r === 'customer');
            const kvMsg = data.chat.find(m => m.r === 'consultant');
            
            let chatHtml = `<div class="w-full max-w-3xl flex flex-col gap-5 bg-transparent" id="chat-simulation-container">`;
            
            if (userMsg) {
                chatHtml += `
                    <div class="flex gap-3 items-start w-[90%] sm:w-[85%] fade-in">
                        <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-white flex items-center justify-center text-sm sm:text-base shrink-0 shadow-sm border border-slate-200"><i class="fa-regular fa-user text-slate-400"></i></div>
                        <div class="bg-white border border-slate-200 p-3 sm:p-4 rounded-2xl rounded-tl-none text-sm sm:text-[15px] text-slate-700 shadow-sm leading-relaxed relative">
                            ${userMsg.t}
                        </div>
                    </div>
                `;
            }

            if (kvMsg) {
                chatHtml += `
                    <div id="bot-typing" class="flex gap-3 items-start flex-row-reverse w-[90%] sm:w-[85%] self-end fade-in">
                        <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#ea580c] flex items-center justify-center text-sm sm:text-base text-white shrink-0 shadow-sm"><i class="fa-solid fa-headset"></i></div>
                        <div class="bg-orange-50 border border-orange-200 p-3 sm:p-4 rounded-2xl rounded-tr-none shadow-sm flex items-center h-12 typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                    <div id="bot-response" class="hidden gap-3 items-start flex-row-reverse w-[90%] sm:w-[85%] self-end fade-in">
                        <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#ea580c] flex items-center justify-center text-sm sm:text-base text-white shrink-0 shadow-sm"><i class="fa-solid fa-headset"></i></div>
                        <div class="bg-orange-50 border border-orange-200 p-3 sm:p-4 rounded-2xl rounded-tr-none text-sm sm:text-[15px] text-orange-900 shadow-sm leading-relaxed">
                            ${kvMsg.t}
                        </div>
                    </div>
                `;
            }
            
            chatHtml += `</div>`;

            setTimeout(() => {
                const typing = document.getElementById('bot-typing');
                const response = document.getElementById('bot-response');
                if(typing && response) {
                    typing.classList.add('hidden'); typing.classList.remove('flex');
                    response.classList.remove('hidden'); response.classList.add('flex');
                }
            }, 1000);

            return `<div class="p-4 sm:p-6 lg:p-8 fade-in w-full h-full flex justify-center bg-slate-200/50 shadow-inner pb-20">${chatHtml}</div>`;
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        let lbImages = []; let lbIndex = 0;

        function openLightbox(imgArray, index) {
            lbImages = imgArray; lbIndex = index; lightboxImg.src = lbImages[lbIndex];
            lightbox.classList.remove('hidden'); lightbox.classList.add('flex');
            setTimeout(() => { lightbox.classList.remove('opacity-0'); lightboxImg.classList.remove('scale-95'); lightboxImg.classList.add('scale-100'); }, 10);
        }

        function closeLightbox(e) {
            if(e) e.preventDefault();
            lightbox.classList.add('opacity-0'); lightboxImg.classList.remove('scale-100'); lightboxImg.classList.add('scale-95');
            setTimeout(() => { lightbox.classList.add('hidden'); lightbox.classList.remove('flex'); }, 300);
        }

        function changeLightboxImg(dir) {
            if (lbImages.length <= 1) return;
            lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
            lightboxImg.src = lbImages[lbIndex];
        }

        document.addEventListener('keydown', function(e) {
            const isLightboxOpen = !document.getElementById('lightbox').classList.contains('hidden');
            if (isLightboxOpen) {
                if (e.key === 'ArrowLeft') changeLightboxImg(-1);
                if (e.key === 'ArrowRight') changeLightboxImg(1);
                if (e.key === 'Escape') closeLightbox();
            } else if (activeMainTab === 'ly-thuyet') {
                if (e.key === 'ArrowLeft') changeLocalSlide(-1);
                if (e.key === 'ArrowRight') changeLocalSlide(1);
            }
        });

        // --- QUIZ LOGIC ---
        function renderQuiz() {
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.innerHTML = '';
            if(quizData.length === 0) {
                quizContainer.innerHTML = '<p class="text-center text-slate-500">Chưa có dữ liệu bài kiểm tra.</p>';
                return;
            }
            
            quizData.forEach((quiz, qIndex) => {
                const qDiv = document.createElement('div');
                qDiv.className = "quiz-card bg-white p-5 sm:p-6 rounded-2xl border border-slate-200 shadow-md hover:shadow-lg transition-shadow relative overflow-hidden";
                qDiv.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-orange-400"></div>
                    <div class="bg-orange-50/50 p-4 rounded-xl border border-orange-100 mb-5">
                        <h3 class="font-bold text-sm sm:text-base text-slate-800 leading-relaxed flex items-start gap-2">
                            <span class="text-orange-600 mt-0.5 shrink-0"><i class="fa-regular fa-circle-question"></i></span>
                            <span><span class="text-orange-700 mr-1">Nhận định ${qIndex + 1}:</span> ${quiz.q}</span>
                        </h3>
                    </div>
                    <div class="flex gap-3 btn-container pl-0 sm:pl-4">
                        <button onclick="checkTF(this, ${qIndex}, true)" class="tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold hover:bg-slate-100 flex items-center justify-center gap-2"><i class="fa-solid fa-check text-lg"></i> ĐÚNG</button>
                        <button onclick="checkTF(this, ${qIndex}, false)" class="tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold hover:bg-slate-100 flex items-center justify-center gap-2"><i class="fa-solid fa-xmark text-lg"></i> SAI</button>
                    </div>
                    <div class="explain-box hidden mt-4 ml-0 sm:ml-4 p-4 rounded-xl text-sm fade-in shadow-inner"></div>
                `;
                quizContainer.appendChild(qDiv);
            });
        }

        function checkTF(btn, qIndex, selectedAnswer) {
            const card = btn.closest('.quiz-card');
            const isCorrect = quizData[qIndex].isTrue === selectedAnswer;
            const explainBox = card.querySelector('.explain-box');
            
            card.classList.add('card-solved'); 
            
            const btns = card.querySelectorAll('.tf-btn');
            btns.forEach(b => {
                b.className = "tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-slate-200 bg-slate-100 text-slate-400 font-bold flex items-center justify-center gap-2 pointer-events-none";
            });

            if (isCorrect) {
                btn.className = "tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-green-500 bg-green-500 text-white font-bold flex items-center justify-center gap-2 pointer-events-none shadow-md";
                explainBox.className = "explain-box mt-4 ml-0 sm:ml-4 p-4 rounded-xl bg-green-50 border border-green-200 text-sm text-green-900 fade-in shadow-inner";
                explainBox.innerHTML = `<strong class="block mb-1 text-green-700"><i class="fa-solid fa-circle-check"></i> Chính xác!</strong> ${quizData[qIndex].explain}`;
                window.quizScore = (window.quizScore || 0) + 1;
            } else {
                btn.className = "tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-red-500 bg-red-500 text-white font-bold flex items-center justify-center gap-2 pointer-events-none shadow-md";
                explainBox.className = "explain-box mt-4 ml-0 sm:ml-4 p-4 rounded-xl bg-green-50 border border-green-200 text-sm text-green-900 fade-in shadow-inner";
                explainBox.innerHTML = `<strong class="block mb-1 text-red-700"><i class="fa-solid fa-triangle-exclamation"></i> Rất tiếc, chưa đúng!</strong> ${quizData[qIndex].explain}`;
                
                const correctBtnIdx = quizData[qIndex].isTrue ? 0 : 1;
                btns[correctBtnIdx].classList.add('border-green-400', 'text-green-600', 'bg-green-50');
            }
            explainBox.classList.remove('hidden');

            window.quizAnswered = (window.quizAnswered || 0) + 1;
            if(window.quizAnswered === quizData.length) {
                 setTimeout(() => showQuizResultPopup(), 600);
            }
        }

        function showQuizResultPopup() {
            const popup = document.getElementById('quiz-result-popup');
            const scoreDisplay = document.getElementById('quiz-score-display');
            const content = document.getElementById('quiz-popup-content');
            
            scoreDisplay.innerText = window.quizScore + ' / ' + quizData.length;
            popup.classList.remove('hidden'); popup.classList.add('flex');
            
            setTimeout(() => {
                popup.classList.remove('opacity-0');
                content.classList.remove('scale-95'); content.classList.add('scale-100');
            }, 10);
        }

        function closeQuizPopup() {
            const popup = document.getElementById('quiz-result-popup');
            const content = document.getElementById('quiz-popup-content');
            
            popup.classList.add('opacity-0');
            content.classList.remove('scale-100'); content.classList.add('scale-95');
            
            setTimeout(() => {
                popup.classList.add('hidden'); popup.classList.remove('flex');
            }, 300);
        }

        function resetQuiz() {
            closeQuizPopup();
            window.quizScore = 0; window.quizAnswered = 0;
            renderQuiz();
            document.getElementById('sec-kiem-tra').scrollTop = 0;
        }
    </script>
</body>
</html>
