            { q: "Bạn bắt buộc phải khai báo tài khoản ngân hàng trong Sổ quỹ để hệ thống có dữ liệu tạo mã QR.", isTrue: true, explain: "Thông tin tài khoản trong Sổ quỹ là căn cứ để phần mềm tạo mã QR thanh toán chính xác." },
            { q: "Phải cài đặt phần mềm điều khiển riêng trên Windows mới dùng được màn hình QR.", isTrue: false, explain: "Thiết bị 'Cắm là chạy', chỉ cần kết nối USB và chọn cổng COM trên màn hình bán hàng KiotViet." },
            { q: "Biểu tượng Tick xanh sẽ xuất hiện trên màn hình QR khi giao dịch chuyển khoản thành công (nếu có liên kết).", isTrue: true, explain: "Đây là tính năng xác thực thông minh giúp nhân viên biết khách đã chuyển tiền xong mà không cần xem điện thoại." },
            { q: "Muốn hiện QR trên điện thoại (App Mobile) vẫn phải mua thêm màn hình KV99.", isTrue: false, explain: "App di động tự tạo mã QR trực tiếp trên màn hình điện thoại, không cần mua thêm màn hình KV99." }
        ];

        let currentTopic = 0; let currentLocalSlideIdx = 0; let activeMainTab = 'ly-thuyet';
        window.quizScore = 0; window.quizAnswered = 0;

        document.addEventListener('DOMContentLoaded', () => {
            if(unifiedData.length > 0) { renderSidebarList(); switchMainTab('ly-thuyet'); }
        });

        function switchMainTab(tab) {
            activeMainTab = tab;
            const btnLyThuyet = document.getElementById('btn-ly-thuyet');
            const btnMoPhong = document.getElementById('btn-mo-phong');
            const btnKiemTra = document.getElementById('btn-kiem-tra');
            
            [btnLyThuyet, btnMoPhong].forEach(btn => {
                if(btn) {
                    btn.classList.remove('active', 'bg-[#db2777]', 'text-white', 'shadow-md', 'border-[#be185d]');
                    btn.classList.add('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            });
            if(btnKiemTra) btnKiemTra.classList.remove('active');

            if (tab === 'kiem-tra') {
                if(btnKiemTra) btnKiemTra.classList.add('active');
            } else if (tab === 'ly-thuyet') {
                if(btnLyThuyet) {
                    btnLyThuyet.classList.add('active', 'bg-[#db2777]', 'text-white', 'shadow-md', 'border-[#be185d]');
                    btnLyThuyet.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            } else if (tab === 'mo-phong') {
                if(btnMoPhong) {
                    btnMoPhong.classList.add('active', 'bg-[#db2777]', 'text-white', 'shadow-md', 'border-[#be185d]');
                    btnMoPhong.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            }

            const learningWrapper = document.getElementById('learning-content-wrapper');
            const quizSec = document.getElementById('sec-kiem-tra');
            const topicList = document.getElementById('sidebar-topic-list');
            
            if (activeMainTab === 'kiem-tra') {
                learningWrapper.classList.add('hidden'); learningWrapper.classList.remove('flex');
                quizSec.classList.remove('hidden'); quizSec.classList.add('flex');
                topicList.classList.add('opacity-50', 'pointer-events-none'); 
                document.getElementById('content-header-title').innerText = "Kiểm tra kiến thức";
                if(document.getElementById('quiz-container').children.length === 0) renderQuiz();
            } else {
                quizSec.classList.add('hidden'); quizSec.classList.remove('flex');
                learningWrapper.classList.remove('hidden'); learningWrapper.classList.add('flex');
                topicList.classList.remove('opacity-50', 'pointer-events-none');
                if(unifiedData.length > 0) updateContentArea(); 
            }
        }

        function renderSidebarList() {
            const list = document.getElementById('sidebar-topic-list');
            list.innerHTML = '';
            unifiedData.forEach((item, idx) => {
                const btn = document.createElement('button');
                const isActive = idx === currentTopic;
                const activeClasses = isActive 
                    ? 'active bg-slate-100 text-[#db2777] border-[#db2777] font-bold' 
                    : 'border-transparent text-slate-700 hover:bg-pink-50';
                
                btn.className = `topic-item w-full text-left px-3 py-3 mb-1 font-semibold text-sm rounded-lg flex items-center gap-3 border-l-4 ${activeClasses}`;
                btn.innerHTML = `<span class="w-5 text-center text-slate-400 shrink-0">${item.icon}</span> <span class="truncate leading-snug">${item.title}</span>`;
                btn.onclick = () => { selectTopic(idx); };
                list.appendChild(btn);
            });

            const prevMob = document.getElementById('btn-prev-mobile');
            const nextMob = document.getElementById('btn-next-mobile');
            if(prevMob) prevMob.disabled = currentTopic === 0;
            if(nextMob) nextMob.disabled = currentTopic === unifiedData.length - 1;
        }

        function selectTopic(index) {
            currentTopic = index; currentLocalSlideIdx = 0;
            if(activeMainTab === 'kiem-tra') switchMainTab('ly-thuyet'); 
            renderSidebarList(); updateContentArea();
        }

        function updateContentArea() {
            const data = unifiedData[currentTopic];
            document.getElementById('content-header-icon').innerHTML = activeMainTab === 'mo-phong' ? '<i class="fa-regular fa-comments text-[#db2777]"></i>' : data.icon;
            document.getElementById('content-header-title').innerText = data.title;
            const body = document.getElementById('content-body');
            body.innerHTML = '';
            if (activeMainTab === 'ly-thuyet') {
                body.innerHTML = buildTheoryHTML(data); updateLocalSliderView();
            } else if (activeMainTab === 'mo-phong') {
                body.innerHTML = buildChatHTML(data);
            }
        }

        function buildTheoryHTML(data) {
            if (data.isIntro) {
                let benefitsHtml = data.benefits ? `
                    <div>
                        <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2 text-base"><i class="fa-solid fa-star text-amber-500"></i> Lợi ích nổi bật</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            ${data.benefits.map(b => `
                                <div class="bg-slate-50 border border-slate-200 p-5 rounded-2xl text-center shadow-sm">
                                    <i class="fa-solid ${b.icon} text-3xl text-[#db2777] mb-3 block"></i>
                                    <h5 class="font-bold text-slate-800 mb-1 text-sm">${b.title}</h5>
                                    <p class="text-xs text-slate-500">${b.desc}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : '';

                return `
                    <div class="p-4 sm:p-6 lg:p-8 fade-in w-full max-w-5xl mx-auto flex flex-col gap-6 pb-20">
                        <div class="bg-pink-50 border border-pink-200 p-5 rounded-2xl shadow-sm mt-2">
                            <h4 class="font-bold text-pink-800 mb-2 flex items-center gap-2 text-base"><i class="fa-solid fa-triangle-exclamation text-pink-600"></i> Lưu ý cập nhật</h4>
                            <p class="text-sm text-pink-900/90 leading-relaxed">${data.updateInfo}</p>
                        </div>
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                            <h4 class="font-bold text-slate-800 mb-2 flex items-center gap-2 text-base"><i class="fa-solid fa-bullseye text-[#db2777]"></i> Mô tả tính năng</h4>
                            <p class="text-sm text-slate-600 leading-relaxed">${data.description}</p>
                        </div>
                        ${benefitsHtml}
                        ${data.video ? `<div class="w-full aspect-video rounded-2xl overflow-hidden shadow-sm border border-slate-200"><iframe src="${data.video}" class="w-full h-full" frameborder="0" allowfullscreen></iframe></div>` : ''}
                    </div>
                `;
            }

            let stepsHtml = data.steps ? data.steps.map((step, i) => `
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex gap-3 items-start">
                    <div class="bg-pink-100 text-[#db2777] font-black w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs mt-0.5 shadow-sm border border-pink-200">${i+1}</div>
                    <div class="text-slate-700 leading-relaxed text-sm flex-1">${step}</div>
                </div>
            `).join('') : '';

            let bottomRowHtml = data.images ? `
                <div class="w-full fade-in">
                    <h3 class="font-bold text-slate-800 uppercase text-xs tracking-wider mb-3 ml-1 flex items-center gap-2 border-b border-slate-200 pb-2"><i class="fa-regular fa-image text-slate-400"></i> Hình ảnh minh họa</h3>
                    <div class="relative w-full aspect-[16/9] rounded-2xl overflow-hidden bg-slate-100/50 border border-slate-200 flex items-center justify-center shadow-inner">
                        <img id="local-slider-img" src="${data.images[0]}" class="w-full h-full object-contain cursor-zoom-in bg-white" onclick="openLightbox(unifiedData[currentTopic].images, currentLocalSlideIdx)">
                    </div>
                    ${data.images.length > 1 ? `
                    <div class="flex justify-center items-center gap-4 mt-4">
                        <button onclick="changeLocalSlide(-1)" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-[#db2777] hover:text-white flex items-center justify-center transition-all shadow-sm"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="local-slider-counter" class="text-sm font-bold text-[#db2777] px-4 py-1.5 bg-pink-50 rounded-full">1 / ${data.images.length}</span>
                        <button onclick="changeLocalSlide(1)" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-[#db2777] hover:text-white flex items-center justify-center transition-all shadow-sm"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>` : ''}
                </div>
            ` : '';

            return `
                <div class="p-4 sm:p-6 lg:p-8 fade-in flex flex-col gap-6 max-w-5xl mx-auto w-full pb-20">
                    <div class="flex flex-col lg:flex-row gap-6">
                        <div class="w-full lg:w-5/12 bg-pink-50/70 p-5 rounded-2xl border border-pink-100 flex flex-col gap-3 h-fit">
                            <strong class="text-pink-900 block text-[11px] uppercase tracking-wider border-b border-pink-200 pb-2">Tình huống:</strong>
                            <p class="text-slate-700 text-[14px] font-medium leading-relaxed italic">"${data.scenario}"</p>
                        </div>
                        <div class="w-full lg:w-7/12 flex flex-col gap-3">
                            <strong class="text-slate-800 block text-[11px] uppercase tracking-wider border-b border-slate-100 pb-2">Hướng dẫn thao tác:</strong>
                            <div class="flex flex-col gap-3">${stepsHtml}</div>
                        </div>
                    </div>
                    ${bottomRowHtml}
                </div>
            `;
        }

        function changeLocalSlide(dir) {
            const data = unifiedData[currentTopic];
            if (!data.images || data.images.length <= 1) return;
            currentLocalSlideIdx = (currentLocalSlideIdx + dir + data.images.length) % data.images.length;
            updateLocalSliderView();
        }

        function updateLocalSliderView() {
            const data = unifiedData[currentTopic];
            if (!data.images || data.images.length <= 1) return;
            const imgEl = document.getElementById('local-slider-img');
            const counter = document.getElementById('local-slider-counter');
            if (imgEl) imgEl.src = data.images[currentLocalSlideIdx];
            if (counter) counter.innerText = `${currentLocalSlideIdx + 1} / ${data.images.length}`;
        }

        function buildChatHTML(data) {
            const chat = data.chat || [];
            let chatHtml = `<div class="w-full max-w-3xl flex flex-col gap-5 pt-4" id="chat-simulation-container">`;
            chat.forEach(msg => {
                if (msg.r === 'customer') {
                    chatHtml += `<div class="flex gap-3 items-start w-[90%] sm:w-[85%] fade-in"><div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-white flex items-center justify-center text-sm shrink-0 shadow-sm border border-slate-200"><i class="fa-regular fa-user text-slate-400"></i></div><div class="bg-white border border-slate-200 p-3 sm:p-4 rounded-2xl rounded-tl-none text-sm text-slate-700 shadow-sm relative">${msg.t}</div></div>`;
                } else {
                    chatHtml += `<div class="flex gap-3 items-start flex-row-reverse w-[90%] sm:w-[85%] self-end fade-in"><div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#db2777] flex items-center justify-center text-sm text-white shrink-0 shadow-sm"><i class="fa-solid fa-headset"></i></div><div class="bg-pink-50 border border-pink-200 p-3 sm:p-4 rounded-2xl rounded-tr-none text-sm text-pink-900 shadow-sm chat-content">${msg.t}</div></div>`;
                }
            });
            chatHtml += `</div>`;
            return `<div class="p-4 sm:p-6 lg:p-8 fade-in w-full h-full flex justify-center bg-slate-200/50 shadow-inner pb-20 overflow-y-auto">${chatHtml}</div>`;
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        let lbImages = []; let lbIndex = 0;
        function openLightbox(imgArray, index) { lbImages = imgArray; lbIndex = index; lightboxImg.src = lbImages[lbIndex]; lightbox.classList.remove('hidden'); lightbox.classList.add('flex'); setTimeout(() => { lightbox.classList.remove('opacity-0'); lightboxImg.classList.remove('scale-95'); lightboxImg.classList.add('scale-100'); }, 10); }
        function closeLightbox(e) { if(e) e.preventDefault(); lightbox.classList.add('opacity-0'); lightboxImg.classList.remove('scale-100'); lightboxImg.classList.add('scale-95'); setTimeout(() => { lightbox.classList.add('hidden'); lightbox.classList.remove('flex'); }, 300); }
        function changeLightboxImg(dir) { if (lbImages.length <= 1) return; lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length; lightboxImg.src = lbImages[lbIndex]; }

        function renderQuiz() {
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.innerHTML = '';
            quizData.forEach((quiz, qIndex) => {
                const qDiv = document.createElement('div');
                qDiv.className = "quiz-card bg-white p-5 sm:p-6 rounded-2xl border border-slate-200 shadow-md relative overflow-hidden";
                qDiv.innerHTML = `<div class="absolute left-0 top-0 bottom-0 w-1.5 bg-pink-400"></div><div class="bg-pink-50/50 p-4 rounded-xl border border-pink-100 mb-5"><h3 class="font-bold text-sm sm:text-base text-slate-800 leading-relaxed flex items-start gap-2"><span>${qIndex + 1}. ${quiz.q}</span></h3></div><div class="flex gap-3"><button onclick="checkTF(this, ${qIndex}, true)" class="tf-btn flex-1 py-3 rounded-lg border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold hover:bg-slate-100 flex items-center justify-center gap-2"><i class="fa-solid fa-check"></i> ĐÚNG</button><button onclick="checkTF(this, ${qIndex}, false)" class="tf-btn flex-1 py-3 rounded-lg border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold hover:bg-slate-100 flex items-center justify-center gap-2"><i class="fa-solid fa-xmark"></i> SAI</button></div><div class="explain-box hidden mt-4 p-4 rounded-xl text-sm fade-in shadow-inner"></div>`;
                quizContainer.appendChild(qDiv);
            });
        }

        function checkTF(btn, qIndex, selectedAnswer) {
            const card = btn.closest('.quiz-card');
            const isCorrect = quizData[qIndex].isTrue === selectedAnswer;
            const explainBox = card.querySelector('.explain-box');
            const btns = card.querySelectorAll('.tf-btn');
            btns.forEach(b => { b.className = "tf-btn flex-1 py-3 rounded-lg border-2 border-slate-200 bg-slate-100 text-slate-400 font-bold flex items-center justify-center gap-2 pointer-events-none"; });

            if (isCorrect) {
                btn.className = "tf-btn flex-1 py-3 rounded-lg border-2 border-green-500 bg-green-500 text-white font-bold flex items-center justify-center gap-2 pointer-events-none";
                explainBox.className = "explain-box mt-4 p-4 rounded-xl bg-green-50 border border-green-200 text-sm text-green-900 fade-in";
                explainBox.innerHTML = `<strong>Chính xác!</strong> ${quizData[qIndex].explain}`;
                window.quizScore++;
            } else {
                btn.className = "tf-btn flex-1 py-3 rounded-lg border-2 border-red-500 bg-red-500 text-white font-bold flex items-center justify-center gap-2 pointer-events-none";
                explainBox.className = "explain-box mt-4 p-4 rounded-xl bg-red-50 border border-red-200 text-sm text-red-900 fade-in";
                explainBox.innerHTML = `<strong>Chưa đúng!</strong> ${quizData[qIndex].explain}`;
                btns[quizData[qIndex].isTrue ? 0 : 1].classList.add('border-green-400', 'text-green-600', 'bg-green-50');
            }
            explainBox.classList.remove('hidden');
            window.quizAnswered++;
            if(window.quizAnswered === quizData.length) { setTimeout(() => showQuizResultPopup(), 600); }
        }

        function showQuizResultPopup() { const popup = document.getElementById('quiz-result-popup'); const scoreDisplay = document.getElementById('quiz-score-display'); scoreDisplay.innerText = window.quizScore + ' / ' + quizData.length; popup.classList.remove('hidden'); popup.classList.add('flex'); setTimeout(() => { popup.classList.remove('opacity-0'); document.getElementById('quiz-popup-content').classList.remove('scale-95'); document.getElementById('quiz-popup-content').classList.add('scale-100'); }, 10); }
        function closeQuizPopup() { document.getElementById('quiz-result-popup').classList.add('hidden'); }
        function resetQuiz() { closeQuizPopup(); window.quizScore = 0; window.quizAnswered = 0; renderQuiz(); }
    </script>
</body>
</html>
