<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiotViet E-Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; color: #334155; background-color: #f8fafc; }
        .tech-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; background: conic-gradient(at top right, #f8fafc, #f1f5f9, #e2e8f0, #f8fafc); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .nav-main-btn { transition: all 0.2s ease; border: 1px solid transparent; }
        .nav-main-btn.active { background-color: #db2777; color: #ffffff; border-color: #be185d; box-shadow: 0 4px 15px -3px rgba(0,0,0,0.1); }
        .nav-main-btn:not(.active):hover { background-color: #f8fafc; color: #db2777; border-color: #db2777; }
        
        .nav-quiz-btn { transition: all 0.2s ease; border: 1px solid transparent; background-color: #f8fafc; color: #ea580c; border-color: #fed7aa; }
        .nav-quiz-btn.active { background-color: #ea580c; color: #ffffff; border-color: #c2410c; box-shadow: 0 4px 15px -3px rgba(234,88,12,0.4); transform: scale(1.02); }
        .nav-quiz-btn:not(.active):hover { background-color: #fff7ed; border-color: #ea580c; transform: scale(1.02); }
        
        .topic-item { transition: all 0.2s; border-left: 3px solid transparent; }
        .topic-item:hover { background-color: #f8fafc; color: #db2777; }
        .topic-item.active { background-color: #f1f5f9; color: #db2777; border-left-color: #db2777; font-weight: 700; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #94a3b8; border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; margin: 0 2px; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .chat-list { list-style-type: disc; padding-left: 1.25rem; margin-top: 0.5rem; }
    </style>
</head>
<body class="flex flex-col h-[100dvh]">

    <div class="tech-bg"></div>

    <header class="shrink-0 bg-#db2777 border-b border-#be185d shadow-sm py-2 sm:py-3 px-4 sm:px-6 z-50" style="background-color: #db2777;">
        <div class="container mx-auto flex justify-between items-center max-w-[1400px]">
            <div class="flex items-center gap-3 sm:gap-4 select-none">
                <img src="https://logo.kiotviet.vn/KiotViet-Logo-Horizontal.svg" alt="KiotViet Logo" class="h-6 sm:h-8" style="filter: brightness(0) invert(1);">
                <span class="text-white/30 font-light text-xl lg:text-2xl hidden sm:inline">|</span>
                <div class="hidden sm:block">
                    <h1 class="text-base sm:text-lg font-bold text-white tracking-tight uppercase leading-tight">E-Learning</h1>
                    <p class="text-[10px] sm:text-xs text-white/80 font-semibold tracking-wide mt-0.5">Hướng Dẫn Lắp Đặt & Sử Dụng Máy Quét Mã Vạch</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-white/20 border border-white/30 px-3 sm:px-4 py-1.5 rounded-full flex items-center gap-1.5 sm:gap-2 shadow-sm backdrop-blur-sm">
                    <i class="fa-solid fa-spa text-white"></i>
                    <span class="text-white font-bold text-xs sm:text-sm tracking-wide hidden xs:inline">Salon & Spa</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 container mx-auto px-2 sm:px-4 py-3 sm:py-4 max-w-[1400px] flex flex-col md:flex-row overflow-hidden gap-3 sm:gap-4 relative">
        <div class="shrink-0 w-full md:w-64 lg:w-72 bg-white/90 backdrop-blur-md rounded-xl shadow-sm border border-slate-200 flex flex-col z-30 overflow-hidden order-2 md:order-1 max-h-[40vh] md:max-h-full">
            <div class="flex p-3 sm:p-4 gap-2 border-b border-slate-100 shrink-0">
                <button onclick="switchMainTab('ly-thuyet')" id="btn-ly-thuyet" class="nav-main-btn active flex-1 py-2 sm:py-2.5 rounded-lg font-bold text-xs sm:text-sm flex flex-col items-center justify-center gap-1 text-center shadow-sm">
                    <i class="fa-solid fa-book-open-reader text-base"></i> Bài học
                </button>
                <button onclick="switchMainTab('mo-phong')" id="btn-mo-phong" class="nav-main-btn bg-slate-50 text-slate-600 border-slate-200 flex-1 py-2 sm:py-2.5 rounded-lg font-bold text-xs sm:text-sm flex flex-col items-center justify-center gap-1 text-center shadow-sm">
                    <i class="fa-regular fa-comments text-base"></i> Mô phỏng
                </button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar p-2" id="sidebar-topic-list"></div>
            <div class="p-3 sm:p-4 border-t border-slate-100 shrink-0 bg-slate-50/50">
                <button onclick="switchMainTab('kiem-tra')" id="btn-kiem-tra" class="nav-quiz-btn w-full py-3 rounded-xl font-black text-sm flex items-center justify-center gap-2 shadow-sm">
                    <i class="fa-solid fa-brain text-lg"></i> Kiểm tra Kiến thức
                </button>
            </div>
        </div>

        <div id="main-content-container" class="flex-1 overflow-hidden flex flex-col bg-white/80 backdrop-blur-md rounded-xl shadow-sm border border-slate-200 relative order-1 md:order-2">
            <div id="learning-content-wrapper" class="flex-1 flex flex-col overflow-hidden">
                <div class="shrink-0 px-4 sm:px-6 py-3 border-b border-slate-200/60 flex justify-between items-center bg-white z-10 shadow-sm gap-3">
                    <div class="flex items-center gap-3">
                        <span id="content-header-icon" class="text-xl sm:text-2xl text-pink-500">💡</span>
                        <h2 id="content-header-title" class="text-base sm:text-xl font-bold text-slate-800 truncate">Tiêu đề</h2>
                    </div>
                    <div class="flex md:hidden gap-2">
                        <button onclick="changeTopic(-1)" id="btn-prev-mobile" class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center disabled:opacity-30"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="changeTopic(1)" id="btn-next-mobile" class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center disabled:opacity-30"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div id="content-body" class="flex-1 overflow-y-auto custom-scrollbar relative flex flex-col bg-slate-50/30"></div>
            </div>

            <div id="sec-kiem-tra" class="hidden flex-1 overflow-y-auto custom-scrollbar p-4 sm:p-8 bg-slate-50/50">
                <div class="max-w-4xl mx-auto flex flex-col h-full relative w-full">
                    <div class="text-center mb-6 shrink-0 bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-200">
                        <div class="w-16 h-16 bg-pink-100 text-#db2777 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-inner border border-pink-200"><i class="fa-solid fa-brain" style="color:#db2777;"></i></div>
                        <h2 class="text-xl sm:text-3xl font-black text-slate-800">Thử thách: Sự thật vs Lầm tưởng</h2>
                        <p class="text-sm sm:text-base text-slate-500 mt-2 font-medium">Đọc kỹ các nhận định dưới đây và xác định xem nó là Đúng hay Sai nhé!</p>
                    </div>
                    <div id="quiz-container" class="space-y-4 sm:space-y-6 pb-20"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="quiz-result-popup" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] hidden items-center justify-center p-4 transition-opacity opacity-0">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center transform scale-95 transition-transform" id="quiz-popup-content">
            <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-4"><i class="fa-solid fa-trophy"></i></div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Tuyệt vời!</h3>
            <p class="text-slate-600 mb-6 font-medium">Bạn đã hoàn thành bài kiểm tra với số điểm <br><strong class="text-3xl text-green-600 block mt-2" id="quiz-score-display">0/0</strong></p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeQuizPopup()" class="px-6 py-2.5 bg-slate-100 text-slate-600 hover:bg-slate-200 font-bold rounded-xl transition-colors">Đóng lại</button>
                <button onclick="resetQuiz()" class="px-6 py-2.5 bg-[#db2777] text-white hover:opacity-90 font-bold rounded-xl transition-opacity shadow-md"><i class="fa-solid fa-rotate-right mr-1"></i> Làm lại</button>
            </div>
        </div>
    </div>

    <div id="lightbox" class="fixed inset-0 bg-slate-900/95 z-[9999] hidden flex-col items-center justify-center p-4 sm:p-8 backdrop-blur-sm transition-opacity opacity-0" onclick="closeLightbox(event)">
        <button onclick="closeLightbox(event)" class="absolute top-4 right-4 sm:top-6 sm:right-6 w-10 h-10 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white text-xl transition-colors z-50 border border-white/20"><i class="fa-solid fa-xmark"></i></button>
        <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-4 sm:px-10 pointer-events-none z-40">
            <button onclick="changeLightboxImg(-1); event.stopPropagation();" class="pointer-events-auto w-12 h-12 bg-black/40 hover:bg-black/70 text-white rounded-full flex items-center justify-center transition-all backdrop-blur-sm"><i class="fa-solid fa-chevron-left"></i></button>
            <button onclick="changeLightboxImg(1); event.stopPropagation();" class="pointer-events-auto w-12 h-12 bg-black/40 hover:bg-black/70 text-white rounded-full flex items-center justify-center transition-all backdrop-blur-sm"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <img id="lightbox-img" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl transition-transform transform scale-95 bg-white z-50" onclick="event.stopPropagation();" />
        <div class="absolute bottom-6 text-white/50 text-sm font-semibold pointer-events-none bg-black/50 px-4 py-1.5 rounded-full backdrop-blur-sm z-50">Sử dụng phím mũi tên ⬅ ➡ để chuyển ảnh</div>
    </div>

    <script>
        const unifiedData = [
            {
                title: 'Giới thiệu chung',
                icon: '<i class="fa-solid fa-flag-checkered"></i>',
                isIntro: true,
                video: 'https://www.youtube.com/embed/JKwMjTL3nPs?si=apPht6Hg0j688YWk',
                images: ['https://cdn-kvweb.kiotviet.vn/kiotviet-website/wp-content/uploads/2026/02/06064538/MAY-QUET-MA-VACH-1.jpg'],
                description: 'Thiết bị hỗ trợ quét mã vạch trên sản phẩm, thẻ liệu trình hoặc voucher để chuẩn hóa và tăng tốc độ thanh toán.',
                benefits: [
                    {icon: 'fa-bolt', title: 'Tăng tốc độ thanh toán', desc: 'Giúp nhân viên lễ tân xử lý hóa đơn nhanh chóng chỉ với một thao tác quét (dầu gội, mỹ phẩm, thẻ liệu trình), giảm thời gian chờ đợi.'},
                    {icon: 'fa-ticket', title: 'Quét voucher và thẻ chính xác', desc: 'Dễ dàng áp dụng khuyến mãi, ghi nhận thẻ thành viên bằng cách quét mã QR/mã vạch, loại bỏ sai sót khi nhập thủ công.'},
                    {icon: 'fa-plug', title: 'Lắp đặt và sử dụng dễ dàng', desc: 'Kết nối USB plug-and-play, không cần cài đặt driver phức tạp, cắm là có thể sử dụng ngay lập tức.'}
                ],
                updateInfo: 'Không có',
                scenario: 'Cửa hàng cần trang bị thiết bị hỗ trợ quét mã vạch trên sản phẩm, thẻ liệu trình hoặc voucher để chuẩn hóa và tăng tốc độ thanh toán.',
                chat: [
                    {role: 'user', content: 'Tính năng máy quét mã vạch mang lại những lợi ích gì cho hoạt động quản lý spa/salon của mình?'},
                    {role: 'bot', content: 'Dạ, việc tích hợp máy quét mã vạch trên KiotViet mang lại những lợi ích vô cùng thiết thực cho cửa hàng của anh/chị: <ul class="chat-list"><li class="mb-2"><strong>Tăng tốc độ thanh toán:</strong> Giúp nhân viên lễ tân xử lý hóa đơn nhanh chóng chỉ với một thao tác quét (dầu gội, mỹ phẩm, thẻ liệu trình), giảm thời gian chờ đợi.</li><li class="mb-2"><strong>Quét voucher và thẻ thành viên chính xác:</strong> Dễ dàng áp dụng khuyến mãi, ghi nhận thẻ thành viên bằng cách quét mã QR/mã vạch, loại bỏ sai sót khi nhập thủ công.</li><li class="mb-2"><strong>Lắp đặt và sử dụng dễ dàng:</strong> Kết nối USB plug-and-play, không cần cài đặt driver phức tạp, cắm là có thể sử dụng ngay lập tức.</li></ul>'}
                ]
            },
            {
                title: 'Giới thiệu tổng quan máy quét 1D (XL-6500A)',
                icon: '<i class="fa-solid fa-barcode"></i>',
                images: [
                    'https://cdn-kvweb.kiotviet.vn/kiotviet-website/wp-content/uploads/2025/12/11070805/Quetmavach_sl_-1.png', 
                    'https://cdn-kvweb.kiotviet.vn/kiotviet-website/wp-content/uploads/2025/12/11070840/Quetmavach_sl_-2.png'

                scenario: 'Tìm hiểu các thông số kỹ thuật cơ bản, ưu điểm và phụ kiện đi kèm của dòng máy quét 1D XL-6500A.',

                    {role: 'user', content: 'Cho mình hỏi máy quét XL-6500A này có ưu điểm gì nổi bật và phù hợp với môi trường salon không?'},
                    {role: 'bot', content: 'Dạ, máy quét XL-6500A rất phù hợp ạ. Máy có tốc độ quét lên đến 300 lần/giây nhận diện mã vạch 1D tức thì. Đặc biệt, chất liệu cao cấp giúp máy chịu va đập tốt từ độ cao 1.5m, rất bền bỉ cho môi trường tại quầy thu ngân spa.'}
                ]
            },
            {
                title: 'Thao tác lắp đặt máy quét (XL-6500A)',
                icon: '<i class="fa-solid fa-tools"></i>',
                images: [
                    'https://cdn-kvweb.kiotviet.vn/kiotviet-website/wp-content/uploads/2025/12/11071040/Quetmavach_sl_-7.png',
                    'https://cdn-kvweb.kiotviet.vn/kiotviet-website/wp-content/uploads/2025/12/11071058/Quetmavach_sl_-8.png',
                    'https://cdn-kvweb.kiotviet.vn/kiotviet-website/wp-content/uploads/2025/12/11071114/Quetmavach_sl_-9.png',
                    'https://cdn-kvweb.kiotviet.vn/kiotviet-website/wp-content/uploads/2025/12/11071138/Quetmavach_sl_-10.png'

                chat: [
                    {role: 'user', content: 'Mình vừa nhận được máy, nhưng không rành kỹ thuật máy tính lắm. Có cần gọi thợ đến cài phần mềm không?'},
                    {role: 'bot', content: 'Dạ không cần đâu ạ! Máy có giao diện cắm là chạy. Chị chỉ cần lắp chân đế, cắm đầu cáp USB vào máy tính, khi nghe tiếng "bíp" là máy đã sẵn sàng sử dụng ngay.'}

                steps: [

                    'Đặt đầu đọc mã vạch lên <strong>Giá đỡ</strong>.',
                    'Cắm đầu dây USB vào máy tính hoặc máy POS. Đợi máy quét phát ra tiếng "bíp" và <strong>Đèn laser</strong> sáng lên.'
                ]
            },
            {

                images: [
                    'https://cdn-kvweb.kiotviet.vn/kiotviet-website/wp-content/uploads/2025/12/11041253/Quetmavach_sl_-13.png',
                    'https://cdn-kvweb.kiotviet.vn/kiotviet-website/wp-content/uploads/2025/12/11071153/Quetmavach_sl_-12.png',

                chat: [
                    {role: 'user', content: 'Máy quét đã kết nối rồi, giờ làm sao để tít mã sản phẩm vào thẳng hóa đơn đang tính tiền cho khách?'},
                    {role: 'bot', content: 'Dạ, trên Màn hình Thu ngân, chị chỉ cần chắc chắn đã nhấp chuột vào <strong>Ô tìm kiếm hàng hóa</strong>, sau đó hướng máy quét vào mã vạch trên chai sản phẩm là xong ạ.'}
                ],
                steps: [

                    'Nghe tiếng "bíp" xác nhận, hệ thống sẽ tự động thêm sản phẩm vào <strong>Hóa đơn</strong>.'
                ]
            },
            {
                title: 'Giới thiệu máy quét 2D (XL-2302)',
                icon: '<i class="fa-solid fa-qrcode"></i>',

                scenario: 'Cửa hàng thường xuyên có các chương trình khuyến mãi qua mã QR, hoặc sử dụng thẻ thành viên điện tử hiển thị trên màn hình điện thoại của khách hàng.',

                    {role: 'user', content: 'Salon của mình có thẻ thành viên QR code trên Zalo của khách. Dùng máy tia laser XL-6500A thì tít màn hình điện thoại không ăn.'},
                    {role: 'bot', content: 'Trường hợp này, chị nên sử dụng dòng máy đa tia XL-2302 ạ. Dòng máy này dùng công nghệ chụp ảnh, có thể đọc mượt mà các mã 2D, QR Code ngay trên màn hình điện thoại phát sáng.'}
                ]

            {

        function switchMainTab(tab) {

            const btnMoPhong = document.getElementById('btn-mo-phong');
            const btnKiemTra = document.getElementById('btn-kiem-tra');
            
            [btnLyThuyet, btnMoPhong].forEach(btn => {
                if(btn) {
                    btn.classList.remove('active', 'bg-[#db2777]', 'text-white', 'shadow-md', 'border-[#be185d]');
                    btn.classList.add('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            });
            if(btnKiemTra) btnKiemTra.classList.remove('active');

            if (tab === 'kiem-tra') {
                if(btnKiemTra) btnKiemTra.classList.add('active');
            } else if (tab === 'ly-thuyet') {
                if(btnLyThuyet) {
                    btnLyThuyet.classList.add('active', 'bg-[#db2777]', 'text-white', 'shadow-md', 'border-[#be185d]');
                    btnLyThuyet.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            } else if (tab === 'mo-phong') {
                if(btnMoPhong) {
                    btnMoPhong.classList.add('active', 'bg-[#db2777]', 'text-white', 'shadow-md', 'border-[#be185d]');
                    btnMoPhong.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            }

            const quizSec = document.getElementById('sec-kiem-tra');
            const topicList = document.getElementById('sidebar-topic-list');
            
            if (activeMainTab === 'kiem-tra') {
                learningWrapper.classList.add('hidden'); learningWrapper.classList.remove('flex');

                topicList.classList.add('opacity-50', 'pointer-events-none');

        function renderSidebarList() {
            const list = document.getElementById('sidebar-topic-list');
            list.innerHTML = '';
            unifiedData.forEach((item, idx) => {
                const btn = document.createElement('button');
                const isActive = idx === currentTopic;
                const activeClasses = isActive 
                    ? 'active bg-slate-100 text-[#db2777] border-[#db2777] font-bold' 
                    : 'border-transparent text-slate-700 hover:bg-pink-50';
                
                btn.className = `topic-item w-full text-left px-3 py-3 mb-1 font-semibold text-sm rounded-lg flex items-center gap-3 border-l-4 ${activeClasses}`;
                btn.innerHTML = `<span class="w-5 text-center text-slate-400 shrink-0">${item.icon}</span> <span class="truncate leading-snug">${item.title}</span>`;
                btn.onclick = () => { selectTopic(idx); };
                list.appendChild(btn);
            });

            const prevMob = document.getElementById('btn-prev-mobile');
            const nextMob = document.getElementById('btn-next-mobile');
            if(prevMob) prevMob.disabled = currentTopic === 0;
            if(nextMob) nextMob.disabled = currentTopic === unifiedData.length - 1;
        }

        function changeTopic(dir) {
            const newIndex = currentTopic + dir;
            if (newIndex >= 0 && newIndex < unifiedData.length) selectTopic(newIndex);

            currentTopic = index; currentLocalSlideIdx = 0;

                let imageElements = data.images.map((img, i) => `<img src="${img}" class="local-slide absolute inset-0 w-full h-full object-contain bg-slate-100 transition-opacity duration-300 ${i===0?'opacity-100 z-10':'opacity-0 z-0'} cursor-zoom-in" onclick="openLightbox(unifiedData[currentTopic].images, ${i})" data-idx="${i}">`).join('');
                let navBtns = data.images.length > 1 ? `
                    <button onclick="changeLocalSlideStep(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-black/40 hover:bg-black/70 text-white rounded-full flex items-center justify-center z-20 backdrop-blur-sm transition-all"><i class="fa-solid fa-chevron-left text-sm"></i></button>
                    <button onclick="changeLocalSlideStep(1)" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-black/40 hover:bg-black/70 text-white rounded-full flex items-center justify-center z-20 backdrop-blur-sm transition-all"><i class="fa-solid fa-chevron-right text-sm"></i></button>
                    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 z-20 bg-black/30 px-2 py-1 rounded-full backdrop-blur-md">${indicators}</div>
                ` : '';

                imageGalleryHtml = `
                    <div class="w-full bg-white p-4 rounded-2xl border border-slate-200 shadow-sm mt-4 lg:mt-6">
                        <strong class="text-slate-800 block text-[11px] uppercase tracking-wider mb-3"><i class="fa-solid fa-images text-slate-400 mr-1"></i> Hình ảnh minh họa:</strong>
                        <div class="relative w-full aspect-[16/9] rounded-xl overflow-hidden border border-slate-200 bg-slate-50 group shadow-inner">
                            ${imageElements}
                            ${navBtns}
                            <div class="absolute top-2 right-2 bg-black/50 text-white text-[10px] px-2 py-1 rounded backdrop-blur-sm z-20 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"><i class="fa-solid fa-magnifying-glass-plus mr-1"></i> Bấm để phóng to</div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="p-4 sm:p-6 lg:p-8 fade-in w-full max-w-5xl mx-auto pb-20">
                    <div class="flex flex-col lg:flex-row gap-6 lg:gap-8 items-start">
                        ${leftCol}
                        ${rightCol}
                    </div>
                    ${imageGalleryHtml}
                </div>
            `;
        }

        function buildChatHTML(data) {
            if(!data.chat || data.chat.length === 0) return `<div class="p-8 text-center text-slate-500 fade-in">Chưa có dữ liệu mô phỏng hội thoại cho bài này.</div>`;
            let chatHtml = `<div class="p-4 sm:p-6 lg:p-8 fade-in w-full max-w-3xl mx-auto flex flex-col gap-6 pb-20 pt-8">`;
            
            data.chat.forEach((msg, idx) => {
                const isUser = msg.role === 'user';
                const avatar = isUser ? '🙋🏻‍♂️' : '<img src="https://logo.kiotviet.vn/KiotViet-Logo-Mark.svg" class="w-5 h-5" style="filter: brightness(0) saturate(100%) invert(26%) sepia(87%) saturate(2371%) hue-rotate(314deg) brightness(97%) contrast(98%);">';
                const alignClass = isUser ? 'justify-end' : 'justify-start';
                const bubbleClass = isUser ? 'bg-[#db2777] text-white rounded-2xl rounded-tr-sm' : 'bg-white border border-slate-200 text-slate-700 rounded-2xl rounded-tl-sm shadow-sm';
                const textClass = isUser ? 'text-white' : 'text-slate-700';
                
                chatHtml += `
                    <div class="flex gap-3 ${alignClass} w-full opacity-0 animate-[fadeIn_0.5s_ease-out_forwards]" style="animation-delay: ${idx * 0.8}s">
                        ${!isUser ? `<div class="w-8 h-8 rounded-full bg-pink-50 border border-pink-100 flex items-center justify-center shrink-0 shadow-sm z-10">${avatar}</div>` : ''}
                        <div class="max-w-[85%] sm:max-w-[75%]">
                            <div class="p-3 sm:p-4 text-[13px] sm:text-[14px] leading-relaxed font-medium ${bubbleClass}">
                                <div class="${textClass}">${msg.content}</div>
                            </div>
                        </div>
                        ${isUser ? `<div class="w-8 h-8 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center shrink-0 shadow-sm text-lg z-10">${avatar}</div>` : ''}
                    </div>
                `;
            });
            chatHtml += `</div>`;
            return chatHtml;
        }

        window.changeLocalSlideStep = function(step) {
            const data = unifiedData[currentTopic];
            if(!data.images) return;
            let newIdx = currentLocalSlideIdx + step;
            if(newIdx < 0) newIdx = data.images.length - 1;
            if(newIdx >= data.images.length) newIdx = 0;
            changeLocalSlide(newIdx);
        };

        window.changeLocalSlide = function(idx) {
            currentLocalSlideIdx = idx;
            updateLocalSliderView();
        };

        function updateLocalSliderView() {
            document.querySelectorAll('.local-slide').forEach(el => {
                if(parseInt(el.dataset.idx) === currentLocalSlideIdx) {
                    el.classList.remove('opacity-0', 'z-0'); el.classList.add('opacity-100', 'z-10');
                } else {
                    el.classList.add('opacity-0', 'z-0'); el.classList.remove('opacity-100', 'z-10');
                }
            });
            document.querySelectorAll('.local-indicator').forEach(el => {
                if(parseInt(el.dataset.idx) === currentLocalSlideIdx) {
                    el.classList.replace('bg-slate-300', 'bg-[#db2777]');
                    el.classList.add('w-4'); el.classList.remove('w-2.5');
                } else {
                    el.classList.replace('bg-[#db2777]', 'bg-slate-300');
                    el.classList.replace('w-4', 'w-2.5');
                }
            });
        }

        let lightboxImages = []; let currentLightboxIdx = 0;
        window.openLightbox = function(images, index) {
            if(!images || images.length === 0) return;
            lightboxImages = images; currentLightboxIdx = index;
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = lightboxImages[currentLightboxIdx];
            lb.classList.remove('hidden'); lb.classList.add('flex');
            setTimeout(() => { lb.classList.remove('opacity-0'); img.classList.remove('scale-95'); img.classList.add('scale-100'); }, 10);
            document.addEventListener('keydown', handleLightboxKey);
        };
        
        window.closeLightbox = function(e) {
            if(e) e.preventDefault();
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            lb.classList.add('opacity-0'); img.classList.remove('scale-100'); img.classList.add('scale-95');
            setTimeout(() => { lb.classList.add('hidden'); lb.classList.remove('flex'); }, 300);
            document.removeEventListener('keydown', handleLightboxKey);
        };

        window.changeLightboxImg = function(dir) {
            currentLightboxIdx += dir;
            if(currentLightboxIdx < 0) currentLightboxIdx = lightboxImages.length - 1;
            if(currentLightboxIdx >= lightboxImages.length) currentLightboxIdx = 0;
            document.getElementById('lightbox-img').src = lightboxImages[currentLightboxIdx];
        };

        function handleLightboxKey(e) {
            if(e.key === 'Escape') closeLightbox();
            if(e.key === 'ArrowRight') changeLightboxImg(1);
            if(e.key === 'ArrowLeft') changeLightboxImg(-1);
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            quizData.forEach((q, i) => {
                container.innerHTML += `
                    <div class="bg-white rounded-2xl p-5 sm:p-6 shadow-sm border border-slate-200 transition-all quiz-card" id="q-card-${i}">
                        <div class="flex gap-4 items-start">
                            <div class="w-8 h-8 rounded-full bg-slate-100 text-slate-500 font-bold flex items-center justify-center shrink-0 text-sm border border-slate-200">${i+1}</div>
                            <div class="flex-1">
                                <h4 class="text-base sm:text-lg font-bold text-slate-800 mb-4 leading-snug">${q.question}</h4>
                                <div class="flex gap-3">
                                    <button onclick="answerQuiz(${i}, true)" id="btn-true-${i}" class="flex-1 py-2.5 sm:py-3 rounded-xl border-2 border-slate-200 font-bold text-slate-600 hover:border-green-500 hover:text-green-600 hover:bg-green-50 transition-all flex items-center justify-center gap-2 text-sm sm:text-base"><i class="fa-solid fa-check"></i> Đúng</button>
                                    <button onclick="answerQuiz(${i}, false)" id="btn-false-${i}" class="flex-1 py-2.5 sm:py-3 rounded-xl border-2 border-slate-200 font-bold text-slate-600 hover:border-red-500 hover:text-red-600 hover:bg-red-50 transition-all flex items-center justify-center gap-2 text-sm sm:text-base"><i class="fa-solid fa-xmark"></i> Sai</button>
                                </div>
                                <div id="exp-${i}" class="hidden mt-4 p-4 rounded-xl text-sm leading-relaxed border font-medium"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.answerQuiz = function(idx, answer) {
            const q = quizData[idx];
            if(q.answered) return;
            q.answered = true; window.quizAnswered++;
            
            const btnTrue = document.getElementById(`btn-true-${idx}`);
            const btnFalse = document.getElementById(`btn-false-${idx}`);
            const exp = document.getElementById(`exp-${idx}`);
            const card = document.getElementById(`q-card-${idx}`);
            
            btnTrue.disabled = true; btnFalse.disabled = true;
            btnTrue.classList.remove('hover:border-green-500', 'hover:text-green-600', 'hover:bg-green-50');
            btnFalse.classList.remove('hover:border-red-500', 'hover:text-red-600', 'hover:bg-red-50');

            const isCorrect = answer === q.isTrue;
            if (isCorrect) window.quizScore++;

            if (answer === true) {
                btnTrue.classList.add(isCorrect ? 'bg-green-500' : 'bg-red-500', 'text-white', 'border-transparent');
                btnFalse.classList.add('opacity-30');
            } else {
                btnFalse.classList.add(isCorrect ? 'bg-green-500' : 'bg-red-500', 'text-white', 'border-transparent');
                btnTrue.classList.add('opacity-30');
            }

            exp.classList.remove('hidden');
            if (isCorrect) {
                card.classList.add('border-green-300', 'bg-green-50/30');
                exp.classList.add('bg-green-50', 'text-green-800', 'border-green-200');
                exp.innerHTML = `<strong class="text-green-600 block mb-1 uppercase tracking-wide text-xs"><i class="fa-solid fa-circle-check"></i> Chính xác</strong> ${q.explanation}`;
            } else {
                card.classList.add('border-red-300', 'bg-red-50/30');
                exp.classList.add('bg-red-50', 'text-red-800', 'border-red-200');
                exp.innerHTML = `<strong class="text-red-600 block mb-1 uppercase tracking-wide text-xs"><i class="fa-solid fa-circle-xmark"></i> Chưa chính xác</strong> ${q.explanation}`;
            }

            if (window.quizAnswered === quizData.length) {
                setTimeout(showQuizResult, 800);
            }
        };

        function showQuizResult() {
            const popup = document.getElementById('quiz-result-popup');
            const content = document.getElementById('quiz-popup-content');
            document.getElementById('quiz-score-display').innerText = `${window.quizScore}/${quizData.length}`;
            popup.classList.remove('hidden'); popup.classList.add('flex');
            setTimeout(() => { popup.classList.remove('opacity-0'); content.classList.remove('scale-95'); content.classList.add('scale-100'); }, 10);
        }

        window.closeQuizPopup = function() {
            const popup = document.getElementById('quiz-result-popup');
            const content = document.getElementById('quiz-popup-content');
            popup.classList.add('opacity-0'); content.classList.remove('scale-100'); content.classList.add('scale-95');
            setTimeout(() => { popup.classList.add('hidden'); popup.classList.remove('flex'); }, 300);
        };

        window.resetQuiz = function() {
            closeQuizPopup();
            window.quizScore = 0; window.quizAnswered = 0;
            quizData.forEach(q => q.answered = false);
            renderQuiz();
            document.getElementById('sec-kiem-tra').scrollTo({top:0, behavior:'smooth'});
        };
    </script>
</body>
</html>
