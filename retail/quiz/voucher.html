        .tech-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; background: conic-gradient(at top right, #f8fafc, #f1f5f9, #e2e8f0, #f8fafc); }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .nav-main-btn.active { background-color: #166def; color: #ffffff; border-color: #166def; box-shadow: 0 2px 8px -1px rgba(22,109,239,0.3); }
        .nav-main-btn:not(.active):hover { background-color: #f8fafc; color: #166def; border-color: #166def; }

        .nav-quiz-btn.active { background-color: #15803d; color: #ffffff; border-color: #166534; box-shadow: 0 4px 10px -3px rgba(22,163,74,0.3); }
        .nav-quiz-btn:not(.active):hover { background-color: #15803d; border-color: #166534; color: #fff; }
        
        .topic-item { transition: all 0.2s; border-left: 3px solid transparent; }
        .topic-item:hover { background-color: rgba(255,255,255,0.05); color: #166def; }
        .topic-item.active { background-color: rgba(255,255,255,0.08); color: #ffffff; border-left-color: #166def; font-weight: 700; }

        </div>

                </div>

                <div id="content-body" class="flex-1 overflow-hidden relative bg-slate-50/30"></div>

                <div class="shrink-0 bg-white border-t border-slate-200/80 px-4 py-2 flex items-center justify-between z-10 shadow-inner">

        let currentTopic = 0;

        document.addEventListener('DOMContentLoaded', () => {
            if(unifiedData.length > 0) { 
                renderSidebarList(); 
                switchMainTab('ly-thuyet'); 
            }
            
            document.addEventListener('keydown', (e) => {
                const lightbox = document.getElementById('lightbox');
                const focusChat = document.getElementById('chat-focus-modal');
                
                if (lightbox && !lightbox.classList.contains('hidden')) {
                    if (e.key === 'ArrowLeft') {
                        changeLightboxImg(-1);
                        e.preventDefault();
                    } else if (e.key === 'ArrowRight') {
                        changeLightboxImg(1);
                        e.preventDefault();
                    } else if (e.key === 'Escape') {
                        closeLightbox();
                    }
                    return;
                }
                
                if (focusChat && !focusChat.classList.contains('hidden')) {
                    if (e.key === 'Escape') {
                        closeChatFocusModal();
                    }
                    return;
                }

                if (activeMainTab === 'ly-thuyet') {
                    if (e.key === 'ArrowLeft') {
                        changeTopic(-1);
                        e.preventDefault();
                    } else if (e.key === 'ArrowRight') {
                        changeTopic(1);
                        e.preventDefault();
                    }
                }

                if (activeMainTab === 'kiem-tra') {
                    if (e.key === 'ArrowLeft') {
                        changeQuizSlide(-1);
                        e.preventDefault();
                    } else if (e.key === 'ArrowRight') {
                        changeQuizSlide(1);
                        e.preventDefault();
                    }
                }
            });
        });

        function formatDescription(text) {
            if (!text) return '';
            const sentences = text.split(/\.(?=\s|$)/);
            return sentences
                .map(s => s.trim())
                .filter(s => s.length > 0)
                .map(s => s.endsWith('.') ? s : s + '.')
                .join('<br><br>');
        }

        function switchMainTab(tab) {
            activeMainTab = tab;
            const btnKiemTra = document.getElementById('btn-kiem-tra');
            const learningWrapper = document.getElementById('learning-content-wrapper');
            const quizSec = document.getElementById('sec-kiem-tra');
            const topicList = document.getElementById('sidebar-topic-list');
            
            if(btnKiemTra) {
                btnKiemTra.classList.remove('active');
                btnKiemTra.classList.add('bg-[#16a34a]', 'border-[#15803d]');
            }

            if (tab === 'kiem-tra') {
                if(btnKiemTra) btnKiemTra.classList.add('active');
                learningWrapper.classList.add('hidden'); learningWrapper.classList.remove('flex');
                quizSec.classList.remove('hidden'); quizSec.classList.add('flex');
                topicList.classList.add('opacity-50', 'pointer-events-none'); 
                currentQuizIdx = 0;
                renderActiveQuizCard();
            } else {
                quizSec.classList.add('hidden'); quizSec.classList.remove('flex');
                learningWrapper.classList.remove('hidden'); learningWrapper.classList.add('flex');
                topicList.classList.remove('opacity-50', 'pointer-events-none');
                if(unifiedData.length > 0) updateContentArea(); 
            }
        }

        function exitQuiz() {
            switchMainTab('ly-thuyet');
        }

        function renderSidebarList() {
            const list = document.getElementById('sidebar-topic-list');
            list.innerHTML = '';
            unifiedData.forEach((item, idx) => {
                const btn = document.createElement('button');
                const isActive = idx === currentTopic;
                const isCompleted = localCompletedTopics.includes(idx);
                
                const activeClasses = isActive 
                    ? 'active text-[#166def] font-bold border-l-4 border-[#166def]' 
                    : 'border-transparent text-slate-300 hover:text-white';
                
                let checkIcon = isCompleted 
                    ? `<span class="text-green-500 shrink-0 ml-auto pl-1" style="font-size:11px !important;"><i class="fa-solid fa-circle-check"></i></span>`
                    : '';

                btn.className = `topic-item w-full text-left px-3 py-2.5 rounded-lg flex items-center justify-between gap-2 border-l-4 font-semibold ${activeClasses}`;
                btn.innerHTML = `<span class="whitespace-normal break-words leading-snug pr-1 flex-1 text-left">${item.title}</span>${checkIcon}`;
                btn.onclick = () => { selectTopic(idx); };
                list.appendChild(btn);
            });
        }

        function selectTopic(index) {
            currentTopic = index; 
            if(activeMainTab === 'kiem-tra') switchMainTab('ly-thuyet'); 
            renderSidebarList(); 
            updateContentArea();
        }

        function markTopicAsCompleted(topicIndex) {
            if (!localCompletedTopics.includes(topicIndex)) {
                localCompletedTopics.push(topicIndex);
                localStorage.setItem('kv_completed_topics_dynamic_f', JSON.stringify(localCompletedTopics));
                renderSidebarList();
            }
        }

        function changeTopic(direction) {
            const nextIdx = currentTopic + direction;
            if (nextIdx >= 0 && nextIdx < unifiedData.length) {
                selectTopic(nextIdx);
            } else if (nextIdx >= unifiedData.length) {
                switchMainTab('kiem-tra');
            }
        }

        function changeInnerImage(direction) {
            const data = unifiedData[currentTopic];
            if (!data.images || data.images.length <= 1) return;
            
            let curIdx = activeImgIndices[currentTopic] || 0;
            curIdx = (curIdx + direction + data.images.length) % data.images.length;
            activeImgIndices[currentTopic] = curIdx;
            
            const imgEl = document.getElementById('quadrant-display-img');
            const indicatorEl = document.getElementById('quadrant-img-indicator');
            const stepBadgeEl = document.getElementById('quadrant-step-badge');
            
            if (imgEl) imgEl.src = data.images[curIdx];
            if (indicatorEl) indicatorEl.innerText = `${curIdx + 1} / ${data.images.length}`;
            if (stepBadgeEl) stepBadgeEl.innerText = `Hình ${curIdx + 1}`;
        }

        function handleImgMouseMove(event) {
            const rect = event.target.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const ratio = x / rect.width;
            if (ratio < 0.25) {
                event.target.style.cursor = 'w-resize';
            } else if (ratio > 0.75) {
                event.target.style.cursor = 'e-resize';
            } else {
                event.target.style.cursor = 'default';
            }
        }

        function handleMainImgClick(event) {
            event.stopPropagation();
            const rect = event.target.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const ratio = x / rect.width;
            if (ratio < 0.25) {
                changeInnerImage(-1);
            } else if (ratio > 0.75) {
                changeInnerImage(1);
            }
        }

        function handleLightboxImgClick(event) {
            event.stopPropagation();
            const rect = event.target.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const ratio = x / rect.width;
            if (ratio < 0.25) {
                changeLightboxImg(-1);
            } else if (ratio > 0.75) {
                changeLightboxImg(1);
            }
        }

        function openLightbox(imgArray, index) { 
            lbImages = imgArray; 
            lbIndex = index; 
            lightboxImg.src = lbImages[lbIndex]; 
            lightbox.classList.remove('hidden'); 
            lightbox.classList.add('flex'); 
            
            const btnPrev = document.getElementById('lb-btn-prev');
            const btnNext = document.getElementById('lb-btn-next');
            if (lbImages.length <= 1) {
                btnPrev.classList.add('hidden');
                btnNext.classList.add('hidden');
            } else {
                btnPrev.classList.remove('hidden');
                btnNext.classList.remove('hidden');
            }

            setTimeout(() => { 
                lightbox.classList.remove('opacity-0'); 
                lightboxImg.classList.remove('scale-95'); 
                lightboxImg.classList.add('scale-100'); 
            }, 10); 
        }

        function closeLightbox(e) { 
            if(e) e.preventDefault(); 
            lightbox.classList.add('opacity-0'); 
            lightboxImg.classList.remove('scale-100'); 
            lightboxImg.classList.add('scale-95'); 
            setTimeout(() => { 
                lightbox.classList.add('hidden'); 
                lightbox.classList.remove('flex'); 
            }, 200); 
        }

        function changeLightboxImg(dir) { 
            if (lbImages.length <= 1) return; 
            lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length; 
            lightboxImg.src = lbImages[lbIndex]; 
            
            activeImgIndices[currentTopic] = lbIndex;
            const qImg = document.getElementById('quadrant-display-img');
            const indicatorEl = document.getElementById('quadrant-img-indicator');
            const stepBadgeEl = document.getElementById('quadrant-step-badge');
            
            if (qImg) qImg.src = lbImages[lbIndex];
            if (indicatorEl) indicatorEl.innerText = `${lbIndex + 1} / ${lbImages.length}`;
            if (stepBadgeEl) stepBadgeEl.innerText = `Hình ${lbIndex + 1}`;
        }

        const lightboxImg = document.getElementById('lightbox-img');

                                    ${data.benefits.map(b => `
                                        <div class="bg-white p-2.5 rounded-xl border border-green-200 shadow-xs">
                                            <strong class="block text-green-800 mb-0.5"><i class="fa-solid ${b.icon} text-green-500 mr-1"></i> ${b.title}</strong>
                                            <p class="text-slate-500 leading-relaxed">${b.desc}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="col-span-2 bg-[#e6f4ff] rounded-xl border border-[#adcbe3] p-4 shadow-sm flex flex-col h-full overflow-hidden justify-between">
                            <div class="flex justify-between items-center border-b border-blue-200 pb-2.5 mb-3 shrink-0">
                                <span class="font-bold text-[#0a528a] flex items-center gap-1.5 heading-text" style="font-size:12px !important;">
                                    <span class="w-2.5 h-2.5 bg-blue-500 rounded-full shrink-0"></span> Sơ đồ nghiệp vụ trực quan
                                </span>
                                <div class="flex items-center gap-2">
                                    <button onclick="openChatFocusModal()" class="font-bold text-[#166def] hover:opacity-95 bg-white hover:bg-blue-50 border border-blue-200 px-3 py-1 rounded-lg transition-all flex items-center gap-1.5 shrink-0 shadow-sm"><i class="fa-regular fa-comments"></i> Xem Hội thoại</button>
                                    ${infoBtnHtml}
                                </div>
                            </div>
                            
                            <div class="flex-1 w-full flex items-center justify-center overflow-hidden relative">
                                <div class="w-full aspect-[16/9] relative rounded-xl bg-white border border-blue-200/60 shadow-inner flex items-center justify-center overflow-hidden">
                                    ${mediaContainerHtml}
                                </div>
                            </div>
                            
                            <div class="mt-3 bg-cyan-50 border border-cyan-100 p-2.5 rounded-xl text-cyan-900 font-semibold shrink-0">
                                <i class="fa-solid fa-bell mr-1"></i> ${data.updateInfo}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                const curImgIdx = activeImgIndices[currentTopic] || 0;
                const activeImg = data.images[curImgIdx] || data.images[0];
                const totalImg = data.images.length;

                let displayAreaHtml = '';
                if (totalImg === 0) {
                    displayAreaHtml = `
                        <div class="w-full aspect-[16/9] relative rounded-xl bg-white border border-blue-200/60 shadow-inner flex flex-col items-center justify-center overflow-hidden p-6 text-center">
                            <div class="w-16 h-16 rounded-full bg-blue-50 border border-blue-200 flex items-center justify-center text-[#166def] text-2xl mb-3">
                                <i class="fa-solid fa-circle-info"></i>
                            </div>
                            <h4 class="font-bold text-slate-700 mb-1">Quy tắc nghiệp vụ hệ thống</h4>
                            <p class="text-slate-500 max-w-sm">Bài học này tập trung vào các quy tắc kiểm soát và tính toàn vẹn dữ liệu. Vui lòng tham khảo các bước thao tác lý thuyết chi tiết ở cột bên trái.</p>
                        </div>
                    `;
                } else {
                    const imgControls = totalImg > 1 ? `
                        <button onclick="changeInnerImage(-1); event.stopPropagation();" class="absolute left-2 top-1/2 -translate-y-1/2 bg-[#166def] hover:opacity-90 text-white w-8 h-8 rounded-full flex items-center justify-center transition-colors shadow-md z-20">
                            <i class="fa-solid fa-chevron-left text-xs"></i>
                        </button>
                        <button onclick="changeInnerImage(1); event.stopPropagation();" class="absolute right-2 top-1/2 -translate-y-1/2 bg-[#166def] hover:opacity-90 text-white w-8 h-8 rounded-full flex items-center justify-center transition-colors shadow-md z-20">
                            <i class="fa-solid fa-chevron-right text-xs"></i>
                        </button>
                        <span id="quadrant-img-indicator" class="absolute bottom-3 right-3 bg-black/60 backdrop-blur-md text-white text-[10px] px-2 py-1 rounded-full font-bold z-20">${curImgIdx + 1} / ${totalImg}</span>
                    ` : '';

                    displayAreaHtml = `
                        <div class="w-full aspect-[16/9] relative rounded-xl bg-white border border-blue-200/60 shadow-inner flex items-center justify-center overflow-hidden">
                            <img id="quadrant-display-img" src="${activeImg}" class="w-full h-full object-contain select-none" onclick="handleMainImgClick(event)" onmousemove="handleImgMouseMove(event)">
                            ${imgControls}
                            <span id="quadrant-step-badge" class="absolute top-4 left-4 bg-blue-100 text-[#166def] border border-blue-200 font-extrabold px-3 py-1 rounded-full uppercase tracking-wider shadow-xs heading-text z-20" style="font-size:10px !important;">
                                Hình ${curImgIdx + 1}
                            </span>
                        </div>
                    `;
                }

                body.innerHTML = `
                    <div class="flex flex-col md:grid md:grid-cols-3 h-full gap-3 p-3 overflow-y-auto md:overflow-hidden box-border">
                        <div class="col-span-1 flex flex-col gap-3 h-full overflow-hidden">
                            <div class="bg-[#ffecc7] border border-[#ffd699] rounded-2xl p-3.5 shadow-sm flex flex-col shrink-0">
                                <span class="font-bold text-[#b25900] uppercase tracking-wider mb-1.5 flex items-center gap-1.5 heading-text" style="font-size:10px !important;">
                                    <i class="fa-solid fa-clipboard-user text-[#b25900]"></i> Tình huống thực tế
                                </span>
                                <div class="bg-white p-2.5 rounded-xl border border-orange-100 flex gap-2 items-start">
                                    <span class="text-base shrink-0">🙋🏻‍♂️</span>
                                    <p class="text-slate-600 font-normal leading-relaxed">${data.scenario}</p>
                                </div>
                            </div>

                            <div class="bg-[#e2f9e9] rounded-xl border border-[#9ee9b3] p-3.5 shadow-sm flex flex-col flex-1 overflow-hidden">
                                <span class="font-bold text-[#1b7a3e] uppercase tracking-wider mb-2 shrink-0 flex items-center gap-1 heading-text" style="font-size:10px !important;"><i class="fa-solid fa-list-check text-[#1b7a3e]"></i> Hướng dẫn thao tác</span>
                                <div class="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 pr-1 py-1">
                                    ${data.steps.map((step, idx) => `
                                        <div class="bg-white p-2.5 rounded-lg border border-green-100 shadow-xs flex gap-2.5 items-start select-none">
                                            <div class="text-slate-700 leading-snug flex-1 font-medium step-text-content"><strong class="text-[#166def]">Bước ${idx + 1}:</strong> ${step}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="col-span-2 bg-[#e6f4ff] rounded-xl border border-[#adcbe3] p-3.5 shadow-sm flex flex-col h-full overflow-hidden justify-between">
                            <div class="flex justify-between items-center border-b border-blue-200 pb-2 mb-2 shrink-0">
                                <span class="font-bold text-[#0a528a] flex items-center gap-1.5 heading-text" style="font-size:12px !important;">
                                    <span class="w-2.5 h-2.5 bg-blue-500 rounded-full shrink-0"></span> Màn hình thao tác phần mềm
                                </span>
                                <div class="flex items-center gap-2">
                                    <button onclick="openChatFocusModal()" class="font-bold text-pink-700 hover:text-pink-900 bg-white hover:bg-pink-50 border border-pink-200 px-3 py-1 rounded-lg transition-all flex items-center gap-1.5 shadow-xs"><i class="fa-regular fa-comments text-pink-500"></i> Xem Hội thoại</button>
                                    ${totalImg > 0 ? `<button onclick="openLightbox(unifiedData[currentTopic].images, activeImgIndices[currentTopic] || 0)" class="font-bold text-slate-500 hover:text-[#166def] flex items-center gap-1 heading-text"><i class="fa-solid fa-magnifying-glass-plus"></i> Phóng to</button>` : ''}
                                </div>
                            </div>

                            <div class="flex-1 w-full flex items-center justify-center overflow-hidden relative">
                                ${displayAreaHtml}
                            </div>
                        </div>
                    </div>
                `;
            }

            updateNavFooter();
        }

        function openChatFocusModal() {
            const modal = document.getElementById('chat-focus-modal');
            const body = document.getElementById('chat-focus-body');
            const data = unifiedData[currentTopic];
            
            if (!data || !data.chat) return;
            
            body.innerHTML = `
                <div class="flex gap-3 items-start w-[85%] self-start">
                    <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-xs shrink-0 shadow border"><i class="fa-regular fa-user text-slate-500"></i></div>
                    <div class="bg-white border p-3 rounded-2xl rounded-tl-none text-slate-700 shadow-sm leading-relaxed">${data.chat[0].t}</div>
                </div>
                <div class="flex gap-3 items-start flex-row-reverse w-[85%] self-end">
                    <div class="w-8 h-8 rounded-full bg-[#166def] flex items-center justify-center text-xs text-white shrink-0 shadow"><i class="fa-solid fa-headset"></i></div>
                    <div class="bg-blue-50 border border-blue-100 p-3 rounded-2xl rounded-tr-none text-blue-950 shadow-sm leading-relaxed">
                        <div class="chat-content-focus text-left">${data.chat[1].t}</div>
                    </div>
                </div>
            `;
            
            const focusUl = body.querySelectorAll('.chat-content-focus ul');
            focusUl.forEach(ul => {
                ul.classList.add('chat-list');
                ul.style.fontSize = '12px';
            });

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.transform').classList.remove('scale-95');
                modal.querySelector('.transform').classList.add('scale-100');
            }, 10);
        }

        function closeChatFocusModal() {
            const modal = document.getElementById('chat-focus-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.remove('scale-100');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        }

        function updateNavFooter() {
            const dotsContainer = document.getElementById('slide-dots-container');
            dotsContainer.innerHTML = '';
            
            const totalTopics = unifiedData.length;
            for (let i = 0; i < totalTopics; i++) {
                const dot = document.createElement('div');
                dot.className = `w-2 h-2 rounded-full cursor-pointer transition-colors ${i === currentTopic ? 'bg-[#166def]' : 'bg-slate-300'}`;
                dot.onclick = () => { selectTopic(i); };
                dotsContainer.appendChild(dot);
            }

            const btnPrev = document.getElementById('btn-slide-prev');
            const btnNext = document.getElementById('btn-slide-next');

            btnPrev.disabled = currentTopic === 0;

            if (currentTopic === totalTopics - 1) {
                btnNext.innerHTML = `Làm Quiz <i class="fa-solid fa-brain text-[10px] ml-1"></i>`;
            } else {
                btnNext.innerHTML = `Bài sau <i class="fa-solid fa-chevron-right text-[10px]"></i>`;
            }
        }

        function renderQuizProgressDashboard() {
            const list = document.getElementById('quiz-progress-dashboard-list');
            if (!list) return;
            list.innerHTML = '';
            quizData.forEach((quiz, idx) => {
                const state = quizAnswersState[idx] || {};
                const isActive = idx === currentQuizIdx;
                
                let iconHtml = `<div class="w-2.5 h-2.5 rounded-full border border-blue-300 shrink-0"></div>`;
                let bgClass = "bg-white text-slate-600 border-blue-100";
                
                if (state.checked) {
                    if (state.isCorrectSelected) {
                        iconHtml = `<i class="fa-solid fa-circle-check text-green-500 text-xs shrink-0"></i>`;
                        bgClass = "bg-green-50/70 text-green-700 border-green-200";
                    } else {
                        iconHtml = `<i class="fa-solid fa-circle-xmark text-red-500 text-xs shrink-0"></i>`;
                        bgClass = "bg-red-50/70 text-red-700 border-red-200";
                    }
                }
                
                if (isActive) {
                    bgClass += " ring-2 ring-[#166def] ring-offset-1 font-bold";
                }
                
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-2.5 py-2 border flex items-center justify-between gap-2 font-semibold transition-all ${bgClass} shrink-0`;
                btn.innerHTML = `<span class="truncate">Nhận định ${idx + 1}</span> ${iconHtml}`;
                btn.onclick = () => {
                    currentQuizIdx = idx;
                    renderActiveQuizCard();
                };
                list.appendChild(btn);
            });
        }

        function renderActiveQuizCard() {
            renderQuizProgressDashboard();
            const cardContainer = document.getElementById('quiz-active-card-container');
            const remarkContainer = document.getElementById('quiz-active-remark-column');
            const quiz = quizData[currentQuizIdx];
            const state = quizAnswersState[currentQuizIdx] || {};

            document.getElementById('quiz-progress-indicator').innerText = `Nhận định ${currentQuizIdx + 1} / ${quizData.length}`;

            let btnCorrectStyle = "border-green-200 text-green-600 hover:bg-green-50 bg-white";
            let btnWrongStyle = "border-red-200 text-red-600 hover:bg-red-50 bg-white";
            let pointerClass = "";

            if (state.checked) {
                pointerClass = "pointer-events-none opacity-40";
                if (state.isCorrectSelected) {
                    if (quiz.isTrue) btnCorrectStyle = "border-green-500 bg-green-500 text-white shadow-sm font-bold";
                    else btnWrongStyle = "border-green-500 bg-green-500 text-white shadow-sm font-bold";
                } else {
                    if (quiz.isTrue) {
                        btnWrongStyle = "border-red-500 bg-red-500 text-white shadow-sm font-bold";
                        btnCorrectStyle = "border-green-400 text-green-600 bg-green-50 font-bold";
                    } else {
                        btnCorrectStyle = "border-red-500 bg-red-500 text-white shadow-sm font-bold";
                        btnWrongStyle = "border-green-400 text-green-600 bg-green-50 font-bold";
                    }
                }
            }

            cardContainer.className = "flex-1 bg-white border border-slate-200 p-5 rounded-2xl shadow-md flex flex-col justify-between relative overflow-y-auto transition-all custom-scrollbar";

            cardContainer.innerHTML = `
                <div class="flex flex-col gap-4 flex-1 justify-center py-2">
                    <div class="bg-[#f0f7ff] border-l-4 border-[#166def] p-4 sm:p-5 rounded-r-xl shadow-xs">
                        <span class="inline-block bg-[#166def] text-white text-[10px] font-black uppercase tracking-widest px-2.5 py-0.5 rounded-full mb-3 heading-text">Nhận định ${currentQuizIdx + 1}</span>
                        <h3 class="font-bold text-slate-800 leading-relaxed heading-text" style="font-size: 13px !important;">
                            ${quiz.q}
                        </h3>
                    </div>
                    <div class="flex gap-3 justify-center items-center py-3 ${pointerClass}">
                        <button onclick="submitQuizAnswer(true)" class="w-28 py-2 rounded-xl border-2 font-black flex items-center justify-center gap-1.5 transition-all tracking-wider ${btnCorrectStyle}">
                            <i class="fa-solid fa-check"></i> ĐÚNG
                        </button>
                        <button onclick="submitQuizAnswer(false)" class="w-28 py-2 rounded-xl border-2 font-black flex items-center justify-center gap-1.5 transition-all tracking-wider ${btnWrongStyle}">
                            <i class="fa-solid fa-xmark"></i> SAI
                        </button>
                    </div>
                </div>
            `;

            if (state.checked) {
                if (state.isCorrectSelected) {
                    remarkContainer.innerHTML = `
                        <div class="flex flex-col gap-3 text-center fade-in">
                            <div class="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-xl mx-auto shadow-sm">
                                <i class="fa-solid fa-circle-check"></i>
                            </div>
                            <h4 class="font-bold text-green-700 text-center heading-text" style="font-size: 14px !important;">Chính xác!</h4>
                            <div class="p-3.5 rounded-xl bg-green-50 border border-green-200 text-left shadow-inner">
                                <p class="text-slate-600 leading-relaxed">${quiz.explain}</p>
                            </div>
                        </div>
                    `;
                } else {
                    remarkContainer.innerHTML = `
                        <div class="flex flex-col gap-3 text-center fade-in">
                            <div class="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center text-xl mx-auto shadow-sm">
                                <i class="fa-solid fa-triangle-exclamation"></i>
                            </div>
                            <h4 class="font-bold text-red-700 text-center heading-text" style="font-size: 14px !important;">Rất tiếc, chưa đúng!</h4>
                            <div class="p-3.5 rounded-xl bg-red-50 border border-red-200 text-left shadow-inner">
                                <p class="text-slate-600 leading-relaxed">${quiz.explain}</p>
                            </div>
                        </div>
                    `;
                }
            } else {
                remarkContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-center p-4 fade-in">
                        <div class="w-14 h-14 rounded-full bg-blue-50 border border-dashed border-blue-300 flex items-center justify-center text-blue-400 text-xl mb-3 animate-pulse">
                            <i class="fa-solid fa-user-pen"></i>
                        </div>
                        <h4 class="font-bold text-slate-700 mb-1 heading-text" style="font-size: 13px !important;">Chưa có câu trả lời</h4>
                        <p class="text-slate-500 max-w-[200px] leading-relaxed mx-auto">Hãy đưa ra nhận định của mình bằng cách bấm nút ĐÚNG hoặc SAI ở cột giữa.</p>
                    </div>
                `;
            }

            document.getElementById('btn-quiz-prev').disabled = currentQuizIdx === 0;
            const btnQuizNext = document.getElementById('btn-quiz-next');
            if (currentQuizIdx === quizData.length - 1) {
                btnQuizNext.innerHTML = `Hoàn thành <i class="fa-solid fa-flag-checkered ml-1"></i>`;
            } else {
                btnQuizNext.innerHTML = `Câu tiếp <i class="fa-solid fa-chevron-right"></i>`;
            }
        }

        function submitQuizAnswer(selectedAnswer) {
            if (quizAnswersState[currentQuizIdx] && quizAnswersState[currentQuizIdx].checked) return;

            const quiz = quizData[currentQuizIdx];
            const isCorrect = quiz.isTrue === selectedAnswer;

            quizAnswersState[currentQuizIdx] = {
                checked: true,
                selected: selectedAnswer,
                isCorrectSelected: isCorrect
            };

            if (isCorrect) {
                window.quizScore = (window.quizScore || 0) + 1;
            }
            window.quizAnswered = (window.quizAnswered || 0) + 1;

            renderActiveQuizCard();

            if (window.quizAnswered === quizData.length) {
                setTimeout(() => showQuizResultPopup(), 1000);
            }
        }

        function changeQuizSlide(direction) {
            const targetIdx = currentQuizIdx + direction;
            if (targetIdx >= 0 && targetIdx < quizData.length) {
                currentQuizIdx = targetIdx;
                renderActiveQuizCard();
            } else if (targetIdx >= quizData.length) {
                if (window.quizAnswered === quizData.length) {
                    showQuizResultPopup();
                } else {
                    const activeContainer = document.getElementById('quiz-active-card-container');
                    activeContainer.classList.add('border-red-400');
                    setTimeout(() => activeContainer.classList.remove('border-red-400'), 500);
                }
            }
        }

        function showQuizResultPopup() { 
            const popup = document.getElementById('quiz-result-popup'); 
            const scoreDisplay = document.getElementById('quiz-score-display'); 
            const content = document.getElementById('quiz-popup-content'); 
            scoreDisplay.innerText = window.quizScore + ' / ' + quizData.length; 
            popup.classList.remove('hidden'); 
            popup.classList.add('flex'); 
            setTimeout(() => { 
                popup.classList.remove('opacity-0'); 
                content.classList.remove('scale-95'); 
                content.classList.add('scale-100'); 
            }, 10); 
        }

        function closeQuizPopup() { 
            const popup = document.getElementById('quiz-result-popup'); 
            const content = document.getElementById('quiz-popup-content'); 
            popup.classList.add('opacity-0'); 
            content.classList.remove('scale-100'); 
            content.classList.add('scale-95'); 
            setTimeout(() => { 
                popup.classList.add('hidden'); 
                popup.classList.remove('flex'); 
            }, 200); 
        }

        function resetQuiz() { 
            closeQuizPopup(); 
            window.quizScore = 0; 
            window.quizAnswered = 0; 
            currentQuizIdx = 0;
            quizAnswersState = {};
            renderActiveQuizCard(); 
            document.getElementById('sec-kiem-tra').scrollTop = 0; 
        }
    </script>
</body>
</html>
