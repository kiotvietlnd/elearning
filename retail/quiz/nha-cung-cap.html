<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; color: #334155; background-color: #f8fafc; }
        .tech-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; background: conic-gradient(at top right, #f8fafc, #f1f5f9, #e2e8f0, #f8fafc); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .nav-main-btn { transition: all 0.2s ease; border: 1px solid transparent; }
        .nav-main-btn.active { background-color: #2563eb; color: #ffffff; border-color: #1d4ed8; box-shadow: 0 4px 15px -3px rgba(0,0,0,0.1); }
        .nav-main-btn:not(.active):hover { background-color: #f8fafc; color: #2563eb; border-color: #2563eb; }
        
        .nav-quiz-btn { transition: all 0.2s ease; border: 1px solid transparent; background-color: #f8fafc; color: #ea580c; border-color: #fed7aa; }
        .nav-quiz-btn.active { background-color: #ea580c; color: #ffffff; border-color: #c2410c; box-shadow: 0 4px 15px -3px rgba(234,88,12,0.4); transform: scale(1.02); }
        .nav-quiz-btn:not(.active):hover { background-color: #fff7ed; border-color: #ea580c; transform: scale(1.02); }
        
        .topic-item { transition: all 0.2s; border-left: 3px solid transparent; }
        .topic-item:hover { background-color: #f8fafc; color: #2563eb; }
        .topic-item.active { background-color: #f1f5f9; color: #2563eb; border-left-color: #2563eb; font-weight: 700; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #94a3b8; border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; margin: 0 2px; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .chat-list { list-style-type: disc; padding-left: 1.25rem; margin-top: 0.5rem; }
    </style>
</head>

            { q: 'Khi xóa một Nhóm nhà cung cấp, tất cả thành viên trong nhóm đó sẽ bị xóa sạch khỏi phần mềm.', isTrue: false, explain: 'Việc xóa Nhóm hoàn toàn an toàn và không gây ảnh hưởng làm mất dữ liệu của các Nhà cung cấp bên trong.' },
            
            { q: 'Nếu đổi trạng thái Nhà cung cấp thành "Ngừng hoạt động", tên của họ sẽ ẩn đi không hiển thị lúc bạn lập Phiếu nhập hàng nữa.', isTrue: true, explain: 'Tính năng này rất hữu ích với các đối tác bạn đã ngừng hợp tác, giúp danh sách tìm kiếm khi nhập hàng gọn gàng hơn mà không cần xóa dữ liệu cũ.' },
            { q: 'Ngừng hoạt động một nhà cung cấp đồng nghĩa với việc xóa vĩnh viễn mọi dữ liệu của họ.', isTrue: false, explain: 'Ngừng hoạt động chỉ là ẩn tạm thời. Bạn vẫn có thể lọc tìm trạng thái này và "Cho phép hoạt động" trở lại bất kỳ lúc nào.' },
            
            { q: 'Khi thao tác Xóa nhà cung cấp, hồ sơ bị xóa nhưng tất cả các hóa đơn giao dịch cũ của họ vẫn được giữ lại trên hệ thống.', isTrue: true, explain: 'Để bảo vệ tính toàn vẹn của lịch sử kinh doanh, các chứng từ cũ không bị mất đi. Tên đối tác trên các phiếu đó sẽ có thêm chữ {DEL} để đánh dấu.' },
            { q: 'Xóa nhà cung cấp sẽ tự động xóa sạch toàn bộ các phiếu nhập hàng và phiếu chi cũ liên quan đến họ.', isTrue: false, explain: 'Phiếu giao dịch cũ được bảo toàn tuyệt đối, hệ thống chỉ xóa hồ sơ danh bạ của nhà cung cấp đó.' },
            
            { q: 'Tính năng Điều chỉnh công nợ giúp bạn sửa trực tiếp con số dư nợ hiện tại cho khớp với thực tế mà không cần tạo phiếu thu/chi.', isTrue: true, explain: 'Tính năng này thường dùng khi bạn chốt sổ với đối tác phát hiện sai lệch nhỏ, hoặc khi bắt đầu dùng phần mềm cần nhập số dư nợ đầu kỳ.' },
            { q: 'Để điều chỉnh sai lệch công nợ, cách duy nhất là bạn phải mở lại từng phiếu nhập hàng cũ để sửa.', isTrue: false, explain: 'Bạn có thể dùng nút "Điều chỉnh" trong tab Công nợ, gõ số nợ cuối cùng cần thiết lập, hệ thống sẽ tự sinh phiếu cân bằng.' },
            
            { q: 'Bạn có thể tạo mới hàng trăm Nhà cung cấp cùng lúc bằng cách điền vào file Excel mẫu và tải lên (Import) KiotViet.', isTrue: true, explain: 'Đây là giải pháp tiết kiệm thời gian nhất khi bạn mới sử dụng phần mềm và cần chuyển dữ liệu từ hệ thống cũ sang KiotViet.' },
            { q: 'KiotViet không cho phép đẩy danh sách từ file Excel lên, bạn bắt buộc phải tạo thủ công từng người một.', isTrue: false, explain: 'Nút "Import" ở góc màn hình hỗ trợ đẩy file Excel hàng loạt lên hệ thống rất tiện lợi và nhanh chóng.' },
            
            { q: 'Khi bật cấu hình Quản lý theo chi nhánh, nhà cung cấp tạo ở Chi nhánh A sẽ không hiển thị trên danh sách của Chi nhánh B.', isTrue: true, explain: 'Cấu hình này phù hợp cho mô hình chuỗi độc lập, nơi mỗi chi nhánh tự làm việc với các nhà cung cấp tại địa phương của mình.' },
            { q: 'Phần mềm KiotViet không có cấu hình phân quyền xem nhà cung cấp theo từng chi nhánh.', isTrue: false, explain: 'Trong Thiết lập cửa hàng -> Hàng hóa có sẵn công tắc "Quản lý nhà cung cấp theo chi nhánh" để bạn bật/tắt theo nhu cầu.' },
            
            { q: 'App KiotViet Quản lý trên điện thoại cho phép bạn xem tổng nợ và bấm tạo phiếu Thanh toán nợ ngay từ xa.', isTrue: true, explain: 'Bạn không cần có mặt tại quầy thu ngân. Chỉ cần cầm điện thoại, vào thông tin Nhà cung cấp -> tab Công nợ là có thể xử lý việc trả tiền nhanh gọn.' },
            { q: 'App điện thoại KiotViet chỉ hỗ trợ xem danh sách tên nhà cung cấp chứ không hiển thị phần công nợ.', isTrue: false, explain: 'App hiển thị đầy đủ thông tin Lịch sử giao dịch và Quản lý công nợ chi tiết không khác gì giao diện máy tính.' }
        ];

        let currentTopic = 0; let currentLocalSlideIdx = 0; let activeMainTab = 'ly-thuyet';
        window.quizScore = 0; window.quizAnswered = 0;

        document.addEventListener('DOMContentLoaded', () => {
            if(unifiedData.length > 0) { renderSidebarList(); switchMainTab('ly-thuyet'); }
        });

        function switchMainTab(tab) {
            activeMainTab = tab;
            const btnLyThuyet = document.getElementById('btn-ly-thuyet');
            const btnMoPhong = document.getElementById('btn-mo-phong');
            const btnKiemTra = document.getElementById('btn-kiem-tra');
            
            [btnLyThuyet, btnMoPhong].forEach(btn => {
                if(btn) {
                    btn.classList.remove('active', 'bg-[#2563eb]', 'text-white', 'shadow-md', 'border-[#1d4ed8]');
                    btn.classList.add('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            });
            if(btnKiemTra) btnKiemTra.classList.remove('active');

            if (tab === 'kiem-tra') {
                if(btnKiemTra) btnKiemTra.classList.add('active');
            } else if (tab === 'ly-thuyet') {
                if(btnLyThuyet) {
                    btnLyThuyet.classList.add('active', 'bg-[#2563eb]', 'text-white', 'shadow-md', 'border-[#1d4ed8]');
                    btnLyThuyet.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            } else if (tab === 'mo-phong') {
                if(btnMoPhong) {
                    btnMoPhong.classList.add('active', 'bg-[#2563eb]', 'text-white', 'shadow-md', 'border-[#1d4ed8]');
                    btnMoPhong.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200');
                }
            }

            const learningWrapper = document.getElementById('learning-content-wrapper');
            const quizSec = document.getElementById('sec-kiem-tra');
            const topicList = document.getElementById('sidebar-topic-list');
            
            if (activeMainTab === 'kiem-tra') {
                learningWrapper.classList.add('hidden'); learningWrapper.classList.remove('flex');
                quizSec.classList.remove('hidden'); quizSec.classList.add('flex');
                topicList.classList.add('opacity-50', 'pointer-events-none'); 
                document.getElementById('content-header-title').innerText = "Kiểm tra kiến thức";
                if(document.getElementById('quiz-container').children.length === 0) renderQuiz();
            } else {
                quizSec.classList.add('hidden'); quizSec.classList.remove('flex');
                learningWrapper.classList.remove('hidden'); learningWrapper.classList.add('flex');
                topicList.classList.remove('opacity-50', 'pointer-events-none');
                if(unifiedData.length > 0) updateContentArea(); 
            }
        }

        function renderSidebarList() {
            const list = document.getElementById('sidebar-topic-list');
            list.innerHTML = '';
            unifiedData.forEach((item, idx) => {
                const btn = document.createElement('button');
                const isActive = idx === currentTopic;
                const activeClasses = isActive 
                    ? 'active bg-slate-100 text-[#2563eb] border-[#2563eb] font-bold' 
                    : 'border-transparent text-slate-700 hover:bg-blue-50';
                
                btn.className = `topic-item w-full text-left px-3 py-3 mb-1 font-semibold text-sm rounded-lg flex items-center gap-3 border-l-4 ${activeClasses}`;
                btn.innerHTML = `<span class="w-5 text-center text-slate-400 shrink-0">${item.icon}</span> <span class="truncate leading-snug">${item.title}</span>`;
                btn.onclick = () => { selectTopic(idx); };
                list.appendChild(btn);
            });

            const prevMob = document.getElementById('btn-prev-mobile');
            const nextMob = document.getElementById('btn-next-mobile');
            if(prevMob) prevMob.disabled = currentTopic === 0;
            if(nextMob) nextMob.disabled = currentTopic === unifiedData.length - 1;
        }

        function changeTopic(dir) {
            const newIndex = currentTopic + dir;
            if (newIndex >= 0 && newIndex < unifiedData.length) selectTopic(newIndex);
        }

        function selectTopic(index) {
            currentTopic = index; currentLocalSlideIdx = 0;
            if(activeMainTab === 'kiem-tra') switchMainTab('ly-thuyet'); 
            renderSidebarList(); updateContentArea();
        }

        function updateContentArea() {
            const data = unifiedData[currentTopic];
            document.getElementById('content-header-icon').innerHTML = activeMainTab === 'mo-phong' ? '<i class="fa-regular fa-comments text-[#2563eb]"></i>' : data.icon;
            document.getElementById('content-header-title').innerText = data.title;
            const body = document.getElementById('content-body');
            body.innerHTML = '';
            if (activeMainTab === 'ly-thuyet') {
                body.innerHTML = buildTheoryHTML(data); updateLocalSliderView();
            } else if (activeMainTab === 'mo-phong') {
                body.innerHTML = buildChatHTML(data);
            }
        }

        function buildTheoryHTML(data) {
            if (data.isIntro) {
                let benefitsHtml = '';
                if(data.benefits && data.benefits.length > 0) {
                    benefitsHtml = `
                        <div>
                            <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2 text-base"><i class="fa-solid fa-star text-amber-500"></i> Lợi ích nổi bật</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                ${data.benefits.map(b => `
                                    <div class="bg-slate-50 border border-slate-200 p-5 rounded-2xl text-center shadow-sm">
                                        <i class="fa-solid ${b.icon || 'fa-layer-group'} text-3xl text-[#2563eb] mb-3 block"></i>
                                        <h5 class="font-bold text-slate-800 mb-1 text-sm">${b.title}</h5>
                                        <p class="text-xs text-slate-500">${b.desc}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                let updateInfoHtml = '';
                if (data.updateInfo && data.updateInfo !== 'Không có') {
                    updateInfoHtml = `
                        <div class="bg-blue-50 border border-blue-200 p-5 rounded-2xl shadow-sm mt-2 fade-in">
                            <h4 class="font-bold text-blue-800 mb-2 flex items-center gap-2 text-base"><i class="fa-solid fa-triangle-exclamation text-blue-600"></i> Lưu ý về Cập nhật</h4>
                            <p class="text-sm text-blue-900/90 leading-relaxed">${data.updateInfo}</p>
                        </div>
                    `;
                }

                let comparisonHtml = '';
                if (data.comparison) {
                    comparisonHtml = `
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm mt-2">
                            <h4 class="font-bold text-slate-800 mb-4 text-center uppercase tracking-wider text-xs flex justify-center items-center gap-2"><i class="fa-solid fa-code-compare text-slate-400"></i> Sự khác biệt cốt lõi</h4>
                            <div class="flex flex-col md:flex-row justify-between items-stretch gap-6 mb-4">
                                <div class="bg-slate-50 border border-slate-200 p-5 rounded-xl text-center w-full md:w-1/2 relative pt-8">
                                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-slate-700 text-white text-[10px] px-3 py-1 rounded-full font-bold whitespace-nowrap">${data.comparison.leftTitle}</div>
                                    <div class="font-black text-slate-800 text-sm mb-1 text-left md:text-center">${data.comparison.leftDesc}</div>
                                </div>
                                <div class="text-xl text-slate-300 hidden md:flex items-center"><i class="fa-solid fa-arrow-right-arrow-left"></i></div>
                                <div class="bg-blue-50 border border-blue-200 p-5 rounded-xl text-center w-full md:w-1/2 relative pt-8">
                                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-[#2563eb] text-white text-[10px] px-3 py-1 rounded-full font-bold whitespace-nowrap">${data.comparison.rightTitle}</div>
                                    <div class="font-black text-blue-800 text-sm mb-1 text-left md:text-center">${data.comparison.rightDesc}</div>
                                </div>
                            </div>
                            ${data.comparison.intersection ? `
                                <div class="bg-slate-100 border border-slate-200 p-4 rounded-xl flex items-start gap-4">
                                    <div class="text-2xl mt-0.5 text-slate-600"><i class="fa-solid fa-link"></i></div>
                                    <div class="text-slate-700 text-xs leading-relaxed">
                                        <strong class="block uppercase tracking-wide text-[10px] text-slate-600 mb-0.5">Giao thoa</strong>
                                        ${data.comparison.intersection}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                
                let videoHtml = data.video ? `<div class="w-full aspect-video rounded-2xl overflow-hidden shadow-sm border border-slate-200 mb-6"><iframe src="${data.video}" class="w-full h-full" frameborder="0" allowfullscreen></iframe></div>` : '';

                return `
                    <div class="p-4 sm:p-6 lg:p-8 fade-in w-full max-w-5xl mx-auto flex flex-col gap-6 pb-20">
                        ${data.images && data.images[0] ? `
                        <div>
                            <div class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2"><i class="fa-solid fa-sitemap"></i> Infographic Tổng quan</div>
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-2 relative group w-full cursor-zoom-in hover:border-blue-300 transition-colors" onclick="openLightbox(unifiedData[0].images, 0)">
                                <img src="${data.images[0]}" alt="Infographic" class="w-full aspect-[16/9] object-contain bg-slate-50 rounded-lg">
                                <div class="absolute inset-0 bg-slate-900/0 group-hover:bg-slate-900/10 transition-colors flex items-center justify-center rounded-2xl">
                                    <div class="bg-white/95 px-4 py-2 rounded-full shadow-lg flex items-center gap-2 text-sm font-bold text-[#2563eb] opacity-0 group-hover:opacity-100 transform translate-y-2 group-hover:translate-y-0 transition-all"><i class="fa-solid fa-magnifying-glass-plus"></i> Phóng to sơ đồ</div>
                                </div>
                            </div>
                        </div>` : ''}
                        
                        ${videoHtml}
                        
                        <div class="bg-blue-50 border border-blue-200 p-5 rounded-2xl shadow-sm">
                            <h4 class="font-bold text-blue-800 mb-2 flex items-center gap-2 text-base"><i class="fa-solid fa-bullseye text-[#2563eb]"></i> Mô tả tính năng</h4>
                            <p class="text-sm text-blue-900/80 leading-relaxed">${data.description || 'Chưa có mô tả tính năng.'}</p>
                        </div>
                        
                        ${benefitsHtml}
                        ${updateInfoHtml}
                        ${comparisonHtml}
                    </div>
                `;
            }

            let leftCol = `
                <div class="w-full lg:w-5/12 bg-blue-50/70 p-5 rounded-2xl border border-blue-100 shadow-inner flex flex-col gap-3">
                    <strong class="text-blue-900 block text-[11px] uppercase tracking-wider border-b border-blue-200 pb-2"><i class="fa-solid fa-clipboard-user text-[#2563eb] mr-1"></i> Tình huống:</strong>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-blue-100 flex gap-3 items-start relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-[#2563eb]"></div><span class="text-2xl mt-0.5">🙋🏻‍♂️</span><p class="text-slate-700 text-[14px] font-medium leading-relaxed">${data.scenario || 'Chưa có tình huống.'}</p>
                    </div>
                </div>
            `;

            let stepsHtml = data.steps && data.steps.length > 0 ? data.steps.map((step, i) => `
                <div class="bg-white p-3 sm:p-4 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden flex gap-3 items-start hover:-translate-y-0.5 transition-transform">
                    <div class="w-1 absolute left-0 top-0 bottom-0 bg-[#2563eb]"></div>
                    <div class="bg-blue-100 text-[#2563eb] font-black w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs mt-0.5 shadow-sm border border-blue-200">${i+1}</div>
                    <div class="text-slate-700 leading-relaxed text-sm flex-1">${step}</div>
                </div>
            `).join('') : '<p class="text-sm text-slate-500 italic">Chưa có hướng dẫn chi tiết.</p>';

            let rightCol = `<div class="w-full lg:w-7/12 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col gap-3"><strong class="text-slate-800 block text-[11px] uppercase tracking-wider border-b border-slate-100 pb-2"><i class="fa-solid fa-list-check text-slate-400 mr-1"></i> Hướng dẫn thao tác:</strong><div class="flex flex-col gap-3">${stepsHtml}</div></div>`;

            let bottomRowHtml = '';
            if (data.images && data.images.length > 0) {
                let navigationHtml = '';
                if (data.images.length > 1) {
                    navigationHtml = `
                        <div class="flex justify-center items-center gap-4 mt-4">
                            <button onclick="changeLocalSlide(-1)" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-[#2563eb] hover:text-white hover:border-[#2563eb] flex items-center justify-center transition-all shadow-sm"><i class="fa-solid fa-chevron-left"></i></button>
                            <span id="local-slider-counter" class="text-sm font-bold text-[#2563eb] px-4 py-1.5 bg-blue-50 rounded-full border border-blue-200">1 / ${data.images.length}</span>
                            <button onclick="changeLocalSlide(1)" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-[#2563eb] hover:text-white hover:border-[#2563eb] flex items-center justify-center transition-all shadow-sm"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    `;
                }

                bottomRowHtml = `
                    <div class="w-full fade-in" style="animation-delay: 0.1s; animation-fill-mode: both;">
                        <h3 class="font-bold text-slate-800 uppercase text-xs tracking-wider mb-3 ml-1 flex items-center gap-2 border-b border-slate-200 pb-2"><i class="fa-regular fa-image text-slate-400"></i> Hình ảnh minh họa</h3>
                        <div class="relative w-full aspect-[16/9] rounded-2xl overflow-hidden bg-slate-100/50 border border-slate-200 flex items-center justify-center shadow-inner">
                            <img id="local-slider-img" src="${data.images[0]}" class="w-full h-full object-contain cursor-zoom-in bg-white" onclick="openLightbox(unifiedData[currentTopic].images, currentLocalSlideIdx)">
                        </div>
                        ${navigationHtml}
                    </div>
                `;
            }

            return `<div class="p-4 sm:p-6 lg:p-8 fade-in flex flex-col gap-6 max-w-5xl mx-auto w-full pb-20"><div class="flex flex-col lg:flex-row gap-4 sm:gap-6">${leftCol}${rightCol}</div>${bottomRowHtml}</div>`;
        }

        function changeLocalSlide(dir) {
            const data = unifiedData[currentTopic];
            if (!data || !data.images || data.images.length <= 1) return;
            const total = data.images.length;
            currentLocalSlideIdx = (currentLocalSlideIdx + dir + total) % total;
            updateLocalSliderView();
        }

        function updateLocalSliderView() {
            const data = unifiedData[currentTopic];
            if (!data || !data.images || data.images.length <= 1) return;
            const imgEl = document.getElementById('local-slider-img');
            const counter = document.getElementById('local-slider-counter');
            if (imgEl) { imgEl.src = data.images[currentLocalSlideIdx]; }
            if (counter) counter.innerText = `${currentLocalSlideIdx + 1} / ${data.images.length}`;
        }

        function buildChatHTML(data) {
            if (!data.chat || data.chat.length === 0) return `<div class="p-10 flex-1 flex items-center justify-center fade-in"><div class="text-center text-slate-400 bg-white p-8 rounded-2xl border border-slate-200 shadow-sm max-w-md w-full"><i class="fa-regular fa-message text-5xl mb-4 text-slate-300"></i><h3 class="font-bold text-lg text-slate-600 mb-1">Chưa có dữ liệu</h3></div></div>`;
            const userMsg = data.chat.find(m => m.r === 'customer');
            const kvMsg = data.chat.find(m => m.r === 'consultant');
            let chatHtml = `<div class="w-full max-w-3xl flex flex-col gap-5 bg-transparent pt-4" id="chat-simulation-container">`;
            if (userMsg) {
                chatHtml += `<div class="flex gap-3 items-start w-[90%] sm:w-[85%] fade-in"><div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-white flex items-center justify-center text-sm sm:text-base shrink-0 shadow-sm border border-slate-200"><i class="fa-regular fa-user text-slate-400"></i></div><div class="bg-white border border-slate-200 p-3 sm:p-4 rounded-2xl rounded-tl-none text-sm sm:text-[15px] text-slate-700 shadow-sm leading-relaxed relative">${userMsg.t}</div></div>`;
            }
            if (kvMsg) {
                chatHtml += `<div id="bot-typing" class="flex gap-3 items-start flex-row-reverse w-[90%] sm:w-[85%] self-end fade-in"><div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#2563eb] flex items-center justify-center text-sm sm:text-base text-white shrink-0 shadow-sm"><i class="fa-solid fa-headset"></i></div><div class="bg-blue-50 border border-blue-200 p-3 sm:p-4 rounded-2xl rounded-tr-none shadow-sm flex items-center h-12 typing-indicator"><span></span><span></span><span></span></div></div><div id="bot-response" class="hidden gap-3 items-start flex-row-reverse w-[90%] sm:w-[85%] self-end fade-in"><div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-[#2563eb] flex items-center justify-center text-sm sm:text-base text-white shrink-0 shadow-sm"><i class="fa-solid fa-headset"></i></div><div class="bg-blue-50 border border-blue-200 p-3 sm:p-4 rounded-2xl rounded-tr-none text-sm sm:text-[15px] text-blue-900 shadow-sm leading-relaxed"><div class="chat-content">${kvMsg.t}</div></div></div>`;
            }
            chatHtml += `</div>`;
            setTimeout(() => {
                const typing = document.getElementById('bot-typing');
                const response = document.getElementById('bot-response');
                if(typing && response) { typing.classList.add('hidden'); typing.classList.remove('flex'); response.classList.remove('hidden'); response.classList.add('flex'); }
                const chatContent = document.querySelectorAll('.chat-content ul');
                chatContent.forEach(ul => { ul.classList.add('chat-list'); });
            }, 1000);
            return `<div class="p-4 sm:p-6 lg:p-8 fade-in w-full h-full flex justify-center bg-slate-200/50 shadow-inner pb-20">${chatHtml}</div>`;
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        let lbImages = []; let lbIndex = 0;
        function openLightbox(imgArray, index) { lbImages = imgArray; lbIndex = index; lightboxImg.src = lbImages[lbIndex]; lightbox.classList.remove('hidden'); lightbox.classList.add('flex'); setTimeout(() => { lightbox.classList.remove('opacity-0'); lightboxImg.classList.remove('scale-95'); lightboxImg.classList.add('scale-100'); }, 10); }
        function closeLightbox(e) { if(e) e.preventDefault(); lightbox.classList.add('opacity-0'); lightboxImg.classList.remove('scale-100'); lightboxImg.classList.add('scale-95'); setTimeout(() => { lightbox.classList.add('hidden'); lightbox.classList.remove('flex'); }, 300); }
        function changeLightboxImg(dir) { if (lbImages.length <= 1) return; lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length; lightboxImg.src = lbImages[lbIndex]; }

        // --- QUIZ LOGIC ---
        function renderQuiz() {
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.innerHTML = '';
            if(quizData.length === 0) { quizContainer.innerHTML = '<p class="text-center text-slate-500">Chưa có dữ liệu bài kiểm tra.</p>'; return; }
            quizData.forEach((quiz, qIndex) => {
                const qDiv = document.createElement('div');
                qDiv.className = "quiz-card bg-white p-5 sm:p-6 rounded-2xl border border-slate-200 shadow-md hover:shadow-lg transition-shadow relative overflow-hidden";
                qDiv.innerHTML = `<div class="absolute left-0 top-0 bottom-0 w-1.5 bg-blue-400"></div><div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 mb-5"><h3 class="font-bold text-sm sm:text-base text-slate-800 leading-relaxed flex items-start gap-2"><span class="text-[#2563eb] mt-0.5 shrink-0"><i class="fa-regular fa-circle-question"></i></span><span><span class="text-blue-700 mr-1">Nhận định ${qIndex + 1}:</span> ${quiz.q}</span></h3></div><div class="flex gap-3 btn-container pl-0 sm:pl-4"><button onclick="checkTF(this, ${qIndex}, true)" class="tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold hover:bg-slate-100 flex items-center justify-center gap-2"><i class="fa-solid fa-check text-lg"></i> ĐÚNG</button><button onclick="checkTF(this, ${qIndex}, false)" class="tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold hover:bg-slate-100 flex items-center justify-center gap-2"><i class="fa-solid fa-xmark text-lg"></i> SAI</button></div><div class="explain-box hidden mt-4 ml-0 sm:ml-4 p-4 rounded-xl text-sm fade-in shadow-inner"></div>`;
                quizContainer.appendChild(qDiv);
            });
        }

        function checkTF(btn, qIndex, selectedAnswer) {
            const card = btn.closest('.quiz-card');
            const isCorrect = quizData[qIndex].isTrue === selectedAnswer;
            const explainBox = card.querySelector('.explain-box');
            card.classList.add('card-solved'); 
            const btns = card.querySelectorAll('.tf-btn');
            btns.forEach(b => { b.className = "tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-slate-200 bg-slate-100 text-slate-400 font-bold flex items-center justify-center gap-2 pointer-events-none"; });

            if (isCorrect) {
                btn.className = "tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-green-500 bg-green-500 text-white font-bold flex items-center justify-center gap-2 pointer-events-none shadow-md";
                explainBox.className = "explain-box mt-4 ml-0 sm:ml-4 p-4 rounded-xl bg-green-50 border border-green-200 text-sm text-green-900 fade-in shadow-inner";
                explainBox.innerHTML = `<strong class="block mb-1 text-green-700"><i class="fa-solid fa-circle-check"></i> Chính xác!</strong> ${quizData[qIndex].explain}`;
                window.quizScore = (window.quizScore || 0) + 1;
            } else {
                btn.className = "tf-btn flex-1 py-2 sm:py-3 rounded-lg border-2 border-red-500 bg-red-500 text-white font-bold flex items-center justify-center gap-2 pointer-events-none shadow-md";
                explainBox.className = "explain-box mt-4 ml-0 sm:ml-4 p-4 rounded-xl bg-red-50 border border-red-200 text-sm text-red-900 fade-in shadow-inner";
                explainBox.innerHTML = `<strong class="block mb-1 text-red-700"><i class="fa-solid fa-triangle-exclamation"></i> Rất tiếc, chưa đúng!</strong> ${quizData[qIndex].explain}`;
                const correctBtnIdx = quizData[qIndex].isTrue ? 0 : 1;
                btns[correctBtnIdx].classList.add('border-green-400', 'text-green-600', 'bg-green-50');
            }
            explainBox.classList.remove('hidden');
            window.quizAnswered = (window.quizAnswered || 0) + 1;
            if(window.quizAnswered === quizData.length) { setTimeout(() => showQuizResultPopup(), 600); }
        }

        function showQuizResultPopup() { const popup = document.getElementById('quiz-result-popup'); const scoreDisplay = document.getElementById('quiz-score-display'); const content = document.getElementById('quiz-popup-content'); scoreDisplay.innerText = window.quizScore + ' / ' + quizData.length; popup.classList.remove('hidden'); popup.classList.add('flex'); setTimeout(() => { popup.classList.remove('opacity-0'); content.classList.remove('scale-95'); content.classList.add('scale-100'); }, 10); }
        function closeQuizPopup() { const popup = document.getElementById('quiz-result-popup'); const content = document.getElementById('quiz-popup-content'); popup.classList.add('opacity-0'); content.classList.remove('scale-100'); content.classList.add('scale-95'); setTimeout(() => { popup.classList.add('hidden'); popup.classList.remove('flex'); }, 300); }
        function resetQuiz() { closeQuizPopup(); window.quizScore = 0; window.quizAnswered = 0; renderQuiz(); document.getElementById('sec-kiem-tra').scrollTop = 0; }
    </script>
</body>
</html>
