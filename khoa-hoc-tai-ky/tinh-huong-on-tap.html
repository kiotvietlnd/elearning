<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cẩm Nang Ôn Tập Tình Huống - Chuyên Viên Tái Ký</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            font-size: 14px; 
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            color: #334155; 
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        /* Nền phát sáng chuyển động mờ */
        .tech-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; background: #f8fafc; }
        .glow-blob-1, .glow-blob-2 { 
            position: absolute; width: 50vw; height: 50vw; filter: blur(140px); border-radius: 50%; 
            transition: background 1.5s ease-in-out; will-change: background, transform;
        }
        .glow-blob-1 { top: -15%; left: -10%; background: rgba(22, 109, 239, 0.08); } 
        .glow-blob-2 { bottom: -15%; right: -10%; background: rgba(16, 185, 129, 0.08); }

        /* Tấm kính mờ siêu rộng */
        .glass-panel-ultra {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.92));
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        /* Tùy chỉnh thanh cuộn nhỏ cho các phân khu */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        /* Chữ Gradient công nghệ */
        .cyber-text-gradient {
            background-size: 200% auto;
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            background-image: linear-gradient(135deg, #166def 0%, #06b6d4 50%, #10b981 100%);
        }
    </style>
</head>
<body class="text-slate-600 antialiased">

    <!-- Nền sáng chuyển động mờ -->
    <div class="tech-bg">
        <div class="glow-blob-1" id="blob-1"></div>
        <div class="glow-blob-2" id="blob-2"></div>
    </div>

    <!-- Bố cục Container chia 2 cột: Sidebar bên trái & Content bên phải -->
    <div class="min-h-screen flex flex-col md:flex-row">

        <!-- THANH SIDEBAR TRÁI (Bộ lọc & Danh sách tất cả tình huống) -->
        <aside class="w-full md:w-[360px] shrink-0 glass-panel-ultra border-b md:border-b-0 md:border-r border-slate-200/80 flex flex-col h-auto md:h-screen md:sticky md:top-0 z-10">
            
            <!-- Sidebar Header / Brand -->
            <div class="p-5 border-b border-slate-100 flex-shrink-0">
                <h1 class="text-lg lg:text-xl font-black text-slate-800 tracking-wide cyber-text-gradient">
                    CẨM NANG ÔN TẬP
                </h1>
                <p class="text-[9px] text-slate-400 mt-1 font-bold tracking-wider uppercase">
                    CHUYÊN VIÊN TÁI KÝ - KIOTVIET
                </p>
            </div>

            <!-- Phân khu các Bộ lọc chọn Lộ trình & Ngày học -->
            <div class="p-5 border-b border-slate-100 space-y-4 flex-shrink-0 bg-slate-50/40">
                
                <!-- Chọn Lộ trình (Retail / FNB) -->
                <div class="space-y-1.5">
                    <span class="text-[10px] font-black text-slate-400 tracking-wider uppercase block">
                        <i class="fa-solid fa-map-signs mr-1"></i> Lộ trình đào tạo
                    </span>
                    <div class="flex gap-1.5 bg-indigo-50/50 p-1 rounded-xl border border-indigo-100/50">
                        <button onclick="switchRoadmap('Retail')" id="roadmap-Retail" class="flex-1 py-2 text-[10px] font-black rounded-lg text-slate-600 transition-all bg-white text-[#166def] shadow-sm flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-tags"></i> RETAIL
                        </button>
                        <button onclick="switchRoadmap('FNB')" id="roadmap-FNB" class="flex-1 py-2 text-[10px] font-black rounded-lg text-slate-600 transition-all flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-bowl-food"></i> F&B
                        </button>
                    </div>
                </div>

                <!-- Chọn Ngày học (Day 1 / 2 / 3) -->
                <div class="space-y-1.5">
                    <span class="text-[10px] font-black text-slate-400 tracking-wider uppercase block">
                        <i class="fa-solid fa-calendar mr-1"></i> Ngày học phần
                    </span>
                    <div class="flex gap-1.5 bg-slate-200/40 p-1 rounded-xl">
                        <button onclick="switchSubTab('day1')" id="sub-tab-day1" class="flex-1 py-1.5 text-[10px] font-extrabold rounded-lg text-slate-600 transition-all bg-white text-[#166def] shadow-sm flex items-center justify-center gap-1">
                            NGÀY 1
                        </button>
                        <button onclick="switchSubTab('day2')" id="sub-tab-day2" class="flex-1 py-1.5 text-[10px] font-extrabold rounded-lg text-slate-600 transition-all flex items-center justify-center gap-1">
                            NGÀY 2
                        </button>
                        <button onclick="switchSubTab('day3')" id="sub-tab-day3" class="flex-1 py-1.5 text-[10px] font-extrabold rounded-lg text-slate-600 transition-all flex items-center justify-center gap-1">
                            NGÀY 3
                        </button>
                    </div>
                </div>
            </div>

            <!-- Phân khu Danh sách tất cả tình huống cùng phiên (Scroll độc lập) -->
            <div class="flex-1 overflow-y-auto custom-scroll p-5 space-y-3">
                <span class="text-[10px] font-black text-slate-400 tracking-wider uppercase block">
                    <i class="fa-solid fa-list-ul mr-1"></i> Danh sách tình huống cùng phiên
                </span>
                
                <!-- Nơi chứa danh sách kết xuất động -->
                <div id="all-scenarios-list" class="space-y-2"></div>
            </div>
        </aside>

        <!-- KHU VỰC CHÍNH BÊN PHẢI (Hiển thị chi tiết tình huống chỉ định/học viên chọn) -->
        <main class="flex-grow p-6 lg:p-10 flex flex-col max-w-4xl w-full mx-auto justify-start space-y-6">

            <!-- Tiêu đề phiên học động -->
            <div class="flex items-center gap-4 bg-white/80 p-4 border border-slate-200/60 rounded-2xl shadow-sm flex-shrink-0 backdrop-blur-sm">
                <span class="w-12 h-12 rounded-2xl bg-blue-50 text-[#166def] flex items-center justify-center text-xl shadow-inner shrink-0" id="session-header-icon">
                    <i class="fa-solid fa-store"></i>
                </span>
                <div>
                    <h2 class="text-xs lg:text-sm font-black text-slate-800 tracking-wide uppercase" id="session-header-title">PHIÊN 1: KIẾN THỨC BÁN LẺ NỀN TẢNG</h2>
                    <p class="text-[11px] text-slate-400 mt-0.5" id="session-header-desc">Vận hành danh mục hàng hóa, kiểm soát kho và quản trị bảng giá đầu vào.</p>
                </div>
            </div>

            <!-- Không gian ôn luyện phản xạ chính -->
            <div class="space-y-4">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <span class="text-xs font-extrabold text-[#166def] uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-desktop"></i> KHÔNG GIAN THỰC HÀNH PHẢN XẠ
                    </span>
                    <button onclick="triggerRandomScenario()" class="px-5 py-2.5 bg-[#166def] hover:bg-blue-600 text-white text-xs font-bold rounded-xl transition-all shadow-md hover:shadow-lg flex items-center gap-2 self-start">
                        <i class="fa-solid fa-dice"></i> CHỌN NGẪU NHIÊN TÌNH HUỐNG KHÁC
                    </button>
                </div>

                <!-- Khung hiển thị chi tiết tình huống trọng tâm -->
                <div id="random-scenario-box"></div>
            </div>

        </main>
    </div>

    <!-- Script điều hướng & xử lý tải dữ liệu từ Google Sheets -->
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyTOCaMQaVouAwWX4QvWtzvGPPcIxRnIG8woZjWRNM3vDqcxJrFOt9ot_kJmVGOC4-FXA/exec";
        const SECURITY_TOKEN = "KIOT_RENEWAL_Q3_2026";

        let scenariosData = {};
        let currentDay = 'day1';
        let currentRoadmap = 'Retail'; // Mặc định là Retail
        let currentRandomScenario = null;

        // Cẩm nang dự phòng offline phòng khi kết nối API lỗi
        const fallbackScenarios = {
            day1: [
                { id: 1, type: "morning", roadmap: "Retail", title: "Tình huống 1: Shop thời trang online & Do dự gia hạn vì tự quản lý ship qua app ngoài", question: 'Khách hàng kinh doanh quần áo online chuẩn bị hết hạn hợp đồng bảo: "Em ơi, giờ chị quét QR ngân hàng cá nhân và tự lên đơn trên app Giao Hàng Tiết Kiệm cũng nhanh, đâu cần qua KiotViet làm gì cho tốn tiền gia hạn hàng năm." Em hãy thuyết phục khách gia hạn.' }
            ],
            day2: [],
            day3: []
        };

        // Tự động tải cẩm nang tình huống từ Google Sheet ngay khi mở trang
        window.onload = function() {
            loadScenariosFromSheet();
        };

        // Hàm lấy danh sách tình huống từ API Google Sheet
        function loadScenariosFromSheet() {
            const box = document.getElementById('random-scenario-box');
            box.innerHTML = `
                <div class="text-center py-12 text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200">
                    <i class="fa-solid fa-spinner animate-spin text-2xl text-[#166def] block mb-2"></i>
                    Đang tải danh sách tình huống hệ thống...
                </div>
            `;

            fetch(`${API_URL}?token=${SECURITY_TOKEN}&action=getScenarios`)
            .then(res => res.json())
            .then(response => {
                if (response.status === "success" && response.data && response.data.length > 0) {
                    scenariosData = { day1: [], day2: [], day3: [] };
                    
                    response.data.forEach(item => {
                        // Tự động bỏ qua dòng tiêu đề lặp lại
                        if (
                            !item.Day || 
                            item.Day.toString().trim().toLowerCase() === "day" || 
                            item.Title.toString().trim().toLowerCase() === "title"
                        ) {
                            return; 
                        }

                        const dayKey = item.Day.toString().trim(); // day1, day2, day3
                        if (scenariosData[dayKey]) {
                            scenariosData[dayKey].push({
                                id: item.id || Math.random().toString(36).substr(2, 9),
                                type: item.Type ? item.Type.toString().trim() : "",
                                title: item.Title,
                                question: item.Question,
                                roadmap: item.Roadmap ? item.Roadmap.toString().trim() : "" // Gắn nhãn lộ trình
                            });
                        }
                    });
                    
                    switchRoadmap('Retail');
                } else {
                    useFallbackData("Lỗi cấu trúc hoặc tệp rỗng. Kích hoạt chế độ dự phòng.");
                }
            })
            .catch(err => {
                console.warn("API load scenarios failed, loading offline handbook:", err);
                useFallbackData("Lỗi kết nối. Kích hoạt cẩm nang offline.");
            });
        }

        // Kích hoạt cẩm nang dự phòng offline
        function useFallbackData(logMessage) {
            scenariosData = fallbackScenarios;
            switchRoadmap('Retail');
            console.info(logMessage);
        }

        // Quy tắc ngắt câu tự động kết xuất văn bản (Hết câu ngắt dòng + chèn 1 dòng trắng)
        // Bổ sung Negative Lookbehind để bỏ qua các số thứ tự 1. 2. 3. không ngắt dòng
        function formatSentences(text) {
            if (!text) return "";
            const sentences = text.split(/(?<!\b\d+\.)(?<=[.?!])\s+/);
            return sentences
                .map(s => s.trim())
                .filter(s => s.length > 0)
                .join('<br><br>');
        }

        // Chuyển đổi Lộ trình học (Retail <-> FNB)
        function switchRoadmap(roadmap) {
            currentRoadmap = roadmap;
            
            const retailBtn = document.getElementById('roadmap-Retail');
            const fnbBtn = document.getElementById('roadmap-FNB');

            if (roadmap === 'Retail') {
                retailBtn.className = "flex-1 py-2 text-[10px] font-black rounded-lg transition-all bg-white text-[#166def] shadow-sm flex items-center justify-center gap-1.5";
                fnbBtn.className = "flex-1 py-2 text-[10px] font-black rounded-lg text-slate-600 transition-all flex items-center justify-center gap-1.5";
            } else {
                retailBtn.className = "flex-1 py-2 text-[10px] font-black rounded-lg text-slate-600 transition-all flex items-center justify-center gap-1.5";
                fnbBtn.className = "flex-1 py-2 text-[10px] font-black rounded-lg transition-all bg-white text-[#166def] shadow-sm flex items-center justify-center gap-1.5";
            }

            // Đồng bộ tải lại danh sách của ngày hiện tại theo lộ trình mới
            switchSubTab(currentDay);
        }

        // Chuyển đổi Ngày học
        function switchSubTab(day) {
            currentDay = day;
            const tabs = ['day1', 'day2', 'day3'];
            const blob1 = document.getElementById('blob-1');
            const blob2 = document.getElementById('blob-2');

            // Cập nhật hiệu ứng glow góc nền
            const bgGlows = {
                day1: ["rgba(22, 109, 239, 0.08)", "rgba(16, 185, 129, 0.08)"],
                day2: ["rgba(249, 115, 22, 0.08)", "rgba(22, 109, 239, 0.08)"],
                day3: ["rgba(16, 185, 129, 0.08)", "rgba(249, 115, 22, 0.08)"]
            };

            if (blob1 && blob2 && bgGlows[day]) {
                blob1.style.background = bgGlows[day][0];
                blob2.style.background = bgGlows[day][1];
            }
            
            tabs.forEach(item => {
                const button = document.getElementById(`sub-tab-${item}`);
                if (button) {
                    if (item === day) {
                        button.classList.add('bg-white', 'text-[#166def]', 'shadow-sm');
                        button.classList.remove('text-slate-600');
                    } else {
                        button.classList.remove('bg-white', 'text-[#166def]', 'shadow-sm');
                        button.classList.add('text-slate-600');
                    }
                }
            });

            // Đồng bộ dữ liệu Header phiên học
            const headerIcon = document.getElementById('session-header-icon');
            const headerTitle = document.getElementById('session-header-title');
            const headerDesc = document.getElementById('session-header-desc');

            if (day === 'day1') {
                headerIcon.innerHTML = '<i class="fa-solid fa-store"></i>';
                headerTitle.textContent = "PHIÊN 1: KIẾN THỨC BÁN LẺ NỀN TẢNG";
                headerDesc.textContent = "Vận hành danh mục hàng hóa, kiểm soát kho và quản trị bảng giá đầu vào.";
            } else if (day === 'day2') {
                headerIcon.innerHTML = '<i class="fa-solid fa-cash-register"></i>';
                headerTitle.textContent = "PHIÊN 2: BÁN HÀNG NÂNG CAO & QUẢN TRỊ ĐA KÊNH";
                headerDesc.textContent = "Đặt - Bán - Trả hàng, tích hợp thanh toán nhanh, đồng bộ sàn TMĐT & khai thác báo cáo.";
            } else if (day === 'day3') {
                headerIcon.innerHTML = '<i class="fa-solid fa-calculator"></i>';
                headerTitle.textContent = "PHIÊN 3: PHÁP LÝ THUẾ & KẾ TOÁN HỘ KINH DOANH";
                headerDesc.textContent = "Xuất hóa đơn từ máy tính tiền, hoàn thiện 7 loại sổ kế toán (TT88) & Tờ khai thuế (TT40).";
            }

            // Đưa danh sách các tình huống lên thanh Sidebar
            renderAllScenarios(day);

            // Tự động chọn ngẫu nhiên 1 tình huống ban đầu để bắt đầu phiên
            triggerRandomScenario();
        }

        // Chọn ngẫu nhiên tình huống ôn luyện
        function triggerRandomScenario() {
            const list = scenariosData[currentDay] 
                ? scenariosData[currentDay].filter(item => item.roadmap === currentRoadmap) 
                : [];

            if (!list || list.length === 0) {
                currentRandomScenario = null;
                renderActiveScenario();
                return;
            }

            const randomIndex = Math.floor(Math.random() * list.length);
            currentRandomScenario = list[randomIndex];
            renderActiveScenario();
        }

        // Chọn cụ thể một tình huống do học viên chủ động click từ danh sách sidebar
        function selectScenario(id) {
            const list = scenariosData[currentDay] 
                ? scenariosData[currentDay].filter(item => item.roadmap === currentRoadmap) 
                : [];
            
            const selected = list.find(item => item.id.toString() === id.toString());
            if (selected) {
                currentRandomScenario = selected;
                renderActiveScenario();
            }
        }

        // Vẽ nội dung tình huống được chọn/chỉ định lên không gian chính bên phải
        function renderActiveScenario() {
            const box = document.getElementById('random-scenario-box');

            if (!currentRandomScenario) {
                box.innerHTML = `
                    <div class="text-center py-12 text-slate-400 bg-white/50 border border-dashed rounded-3xl">
                        <i class="fa-solid fa-circle-question text-xl block mb-2"></i>
                        Lộ trình này chưa có dữ liệu tình huống ôn tập cho ngày học đã chọn.
                    </div>
                `;
                return;
            }

            const isMorning = currentRandomScenario.type === 'morning';
            const colorClass = isMorning ? 'bg-emerald-50/70 border-emerald-200 text-emerald-950' : 'bg-purple-50/70 border-purple-200 text-purple-950';
            const icon = isMorning ? '<i class="fa-solid fa-sun text-emerald-600"></i>' : '<i class="fa-solid fa-moon text-purple-600"></i>';
            const typeLabel = isMorning ? 'Học Phần Sáng' : 'Học Phần Chiều';

            box.innerHTML = `
                <div class="border-2 border-dashed border-[#166def]/20 rounded-3xl p-1.5 bg-white shadow-sm animate-fade">
                    <div class="${colorClass} rounded-2xl p-6 lg:p-8 space-y-4 border">
                        <div class="flex items-center justify-between border-b pb-3 border-current/10">
                            <span class="text-[10px] font-black tracking-widest uppercase flex items-center gap-1.5">
                                ${icon} ${typeLabel} - TÌNH HUỐNG THỰC TẾ
                            </span>
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-white/90 border border-current/10 text-slate-500 uppercase tracking-wide">Đang hiển thị</span>
                        </div>
                        
                        <h4 class="font-extrabold text-base text-slate-800 leading-snug">${escapeHtml(currentRandomScenario.title)}</h4>
                        
                        <div class="text-xs pt-3 border-t border-slate-200/50">
                            <div class="leading-relaxed text-slate-600">
                                <strong class="text-slate-700 text-[10px] uppercase tracking-wider block mb-2">Yêu cầu tình huống:</strong> 
                                <p class="text-sm font-medium text-slate-700 leading-relaxed bg-white/60 p-4 rounded-xl border border-slate-200/40">${formatSentences(escapeHtml(currentRandomScenario.question))}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Làm nổi bật phần tử tương ứng trong danh sách sidebar
            highlightActiveScenarioItem(currentRandomScenario.id);
        }

        // Kết xuất toàn bộ danh sách các tình huống lên thanh Sidebar bên trái
        function renderAllScenarios(day) {
            const container = document.getElementById('all-scenarios-list');
            const list = scenariosData[day] 
                ? scenariosData[day].filter(item => item.roadmap === currentRoadmap) 
                : [];

            if (!list || list.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 py-4 text-center">Chưa có dữ liệu tình huống ôn tập nào.</p>`;
                return;
            }

            const morningTitle = `
                <div class="text-[9px] font-black text-emerald-600 tracking-widest uppercase mb-1.5 mt-3 flex items-center gap-1">
                    <i class="fa-solid fa-sun"></i> Sáng (Lý Thuyết - Tính Năng)
                </div>`;

            const afternoonTitle = `
                <div class="text-[9px] font-black text-purple-600 tracking-widest uppercase mb-1.5 mt-4 flex items-center gap-1">
                    <i class="fa-solid fa-moon"></i> Chiều (Kỹ năng - Phản Xạ)
                </div>`;

            const morningItems = list.filter(item => item.type === 'morning');
            const afternoonItems = list.filter(item => item.type === 'afternoon');

            let htmlContent = "";

            if (morningItems.length > 0) {
                htmlContent += morningTitle;
                htmlContent += `<div class="space-y-1.5">` + morningItems.map(item => `
                    <button id="scen-item-${item.id}" onclick="selectScenario('${item.id}')" class="w-full text-left p-2.5 rounded-lg border border-slate-100 hover:border-emerald-200 hover:bg-emerald-50/20 transition-all text-xs font-semibold flex items-start gap-2 bg-white shadow-sm group">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mt-1.5 shrink-0"></span>
                        <span class="text-slate-700 group-hover:text-emerald-900 leading-tight">${escapeHtml(item.title)}</span>
                    </button>
                `).join('') + `</div>`;
            }

            if (afternoonItems.length > 0) {
                htmlContent += afternoonTitle;
                htmlContent += `<div class="space-y-1.5">` + afternoonItems.map(item => `
                    <button id="scen-item-${item.id}" onclick="selectScenario('${item.id}')" class="w-full text-left p-2.5 rounded-lg border border-slate-100 hover:border-purple-200 hover:bg-purple-50/20 transition-all text-xs font-semibold flex items-start gap-2 bg-white shadow-sm group">
                        <span class="w-1.5 h-1.5 rounded-full bg-purple-500 mt-1.5 shrink-0"></span>
                        <span class="text-slate-700 group-hover:text-purple-900 leading-tight">${escapeHtml(item.title)}</span>
                    </button>
                `).join('') + `</div>`;
            }

            container.innerHTML = htmlContent;
        }

        // Đánh dấu nổi bật tình huống đang được học viên chọn trên sidebar
        function highlightActiveScenarioItem(activeId) {
            // Đưa toàn bộ các thẻ tình huống về giao diện mặc định
            const items = document.querySelectorAll('[id^="scen-item-"]');
            items.forEach(item => {
                item.classList.remove('border-[#166def]/40', 'bg-blue-50/50', 'ring-1', 'ring-[#166def]/20');
                item.classList.add('border-slate-100', 'bg-white');
            });

            // Áp dụng viền nổi bật cho thẻ đang hoạt động
            const activeItem = document.getElementById(`scen-item-${activeId}`);
            if (activeItem) {
                activeItem.classList.remove('border-slate-100', 'bg-white');
                activeItem.classList.add('border-[#166def]/40', 'bg-blue-50/50', 'ring-1', 'ring-[#166def]/20');
                
                // Tự động cuộn mượt đến thẻ đang chọn trên danh sách sidebar nếu bị tràn
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Giữ lại định dạng hỗ trợ tương thích từ mã nguồn cũ
        function toggleAllScenarios() {
            // Hỗ trợ lưu trữ cấu trúc logic cũ
        }

        function escapeHtml(string) {
            if (!string) return "";
            return String(string)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    </script>
