<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cẩm Nang Ôn Tập Tình Huống - Chuyên Viên Tái Ký</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            font-size: 14px; 
            -webkit-tap-highlight-color: transparent;
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            color: #334155; 
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        /* Nền phát sáng chuyển động mờ */
        .tech-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; background: #f8fafc; }
        .glow-blob-1, .glow-blob-2 { 
            position: absolute; width: 50vw; height: 50vw; filter: blur(140px); border-radius: 50%; 
            transition: background 1.5s ease-in-out; will-change: background, transform;
        }
        .glow-blob-1 { top: -15%; left: -10%; background: rgba(22, 109, 239, 0.08); } 
        .glow-blob-2 { bottom: -15%; right: -10%; background: rgba(16, 185, 129, 0.08); }

        /* Tấm kính mờ siêu rộng */
        .glass-panel-ultra {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.92));
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        /* Tùy chỉnh thanh cuộn nhỏ cho các phân khu */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        /* Chữ Gradient công nghệ */
        .cyber-text-gradient {
            background-size: 200% auto;
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            background-image: linear-gradient(135deg, #166def 0%, #06b6d4 50%, #10b981 100%);
        }
    </style>
</head>
<body class="text-slate-600 antialiased">

    <!-- Nền sáng chuyển động mờ -->
    <div class="tech-bg">
        <div class="glow-blob-1" id="blob-1"></div>
        <div class="glow-blob-2" id="blob-2"></div>
    </div>

    <!-- Main Container căn giữa thoáng đãng, rộng rãi -->
    <main class="flex-grow w-full max-w-4xl mx-auto px-6 py-12 flex flex-col justify-center">

        <!-- Tiêu đề trang ôn luyện độc lập (Không có Navbar) -->
        <div class="text-center mb-8">
            <h1 class="text-2xl lg:text-3xl font-black text-slate-800 tracking-wide cyber-text-gradient">
                CẨM NANG ÔN TẬP TÌNH HUỐNG THỰC TẾ
            </h1>
            <p class="text-xs text-slate-400 mt-2 font-bold tracking-wider uppercase">
                Hệ thống tự học và nâng cao năng lực phản xạ - Chuyên viên Tái ký
            </p>
        </div>

        <div class="glass-panel-ultra rounded-3xl p-6 lg:p-8 shadow-xl space-y-6 flex flex-col">
            
            <!-- Phần chọn Lộ trình (Retail / FNB) [1] -->
            <div class="flex gap-2 bg-indigo-50/50 p-1 rounded-2xl border border-indigo-100 flex-shrink-0">
                <button onclick="switchRoadmap('Retail')" id="roadmap-Retail" class="flex-1 py-3 text-xs font-black rounded-xl text-slate-600 transition-all bg-white text-[#166def] shadow-sm flex items-center justify-center gap-2">
                    <i class="fa-solid fa-tags"></i> LỘ TRÌNH RETAIL (BÁN LẺ)
                </button>
                <button onclick="switchRoadmap('FNB')" id="roadmap-FNB" class="flex-1 py-3 text-xs font-black rounded-xl text-slate-600 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-bowl-food"></i> LỘ TRÌNH FNB (F&B)
                </button>
            </div>

            <!-- Phần chọn Ngày học (Day 1 / 2 / 3) -->
            <div class="flex gap-2 bg-slate-200/50 p-1.5 rounded-2xl flex-shrink-0">
                <button onclick="switchSubTab('day1')" id="sub-tab-day1" class="flex-1 py-2.5 text-xs font-extrabold rounded-xl text-slate-600 transition-all bg-white text-[#166def] shadow-sm flex items-center justify-center gap-2">
                    <i class="fa-solid fa-calendar-day"></i> NGÀY 1
                </button>
                <button onclick="switchSubTab('day2')" id="sub-tab-day2" class="flex-1 py-2.5 text-xs font-extrabold rounded-xl text-slate-600 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-calendar-day"></i> NGÀY 2
                </button>
                <button onclick="switchSubTab('day3')" id="sub-tab-day3" class="flex-1 py-2.5 text-xs font-extrabold rounded-xl text-slate-600 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-calendar-day"></i> NGÀY 3
                </button>
            </div>

            <!-- TIÊU ĐỀ PHIÊN HỌC ĐỘNG -->
            <div class="flex items-center gap-4 border-b pb-4 border-slate-100 flex-shrink-0">
                <span class="w-10 h-10 rounded-xl bg-blue-50 text-[#166def] flex items-center justify-center text-lg" id="session-header-icon"><i class="fa-solid fa-store"></i></span>
                <div>
                    <h2 class="text-sm font-black text-slate-800 tracking-wide" id="session-header-title">PHIÊN 1: KIẾN THỨC BÁN LẺ NỀN TẢNG</h2>
                    <p class="text-xs text-slate-400 mt-0.5" id="session-header-desc">Các tính năng phần mềm bán hàng cơ bản</p>
                </div>
            </div>

            <!-- KHU VỰC TÌNH HUỐNG CHỈ ĐỊNH NGẪU NHIÊN -->
            <div class="space-y-4 flex-shrink-0">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <span class="text-xs font-extrabold text-[#166def] uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-shuffle"></i> TÌNH HUỐNG CHỈ ĐỊNH ÔN LUYỆN
                    </span>
                    <button onclick="triggerRandomScenario()" class="px-4 py-2 bg-[#166def] hover:bg-blue-600 text-white text-xs font-bold rounded-xl transition-all shadow-md flex items-center gap-2 self-start">
                        <i class="fa-solid fa-dice"></i> CHỌN NGẪU NHIÊN TÌNH HUỐNG KHÁC
                    </button>
                </div>

                <!-- Khung hiển thị tình huống ngẫu nhiên (Đã bỏ Kỳ vọng đáp án) [1] -->
                <div id="random-scenario-box"></div>
            </div>

            <!-- KHU VỰC DANH SÁCH CÁC TÌNH HUỐNG LƯU TRỮ KHÁC (Mặc định ẩn) -->
            <div class="border-t pt-5 border-slate-100 flex-grow flex flex-col space-y-4">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-black text-slate-400 tracking-wider uppercase block">TẤT CẢ TÌNH HUỐNG CÙNG PHIÊN</span>
                    <button onclick="toggleAllScenarios()" id="toggle-list-btn" class="text-xs font-bold text-[#166def] hover:underline flex items-center gap-2">
                        <i class="fa-solid fa-eye"></i> Xem danh sách tất cả tình huống
                    </button>
                </div>

                <!-- Khối chứa danh sách tình huống ẩn (Đã bỏ Kỳ vọng đáp án) [1] -->
                <div id="all-scenarios-list" class="space-y-4 hidden transition-all"></div>
            </div>

        </div>

    </main>

    <!-- Script điều hướng & xử lý tải dữ liệu từ Google Sheets -->
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyTOCaMQaVouAwWX4QvWtzvGPPcIxRnIG8woZjWRNM3vDqcxJrFOt9ot_kJmVGOC4-FXA/exec";
        const SECURITY_TOKEN = "KIOT_RENEWAL_Q3_2026";

        let scenariosData = {};
        let currentDay = 'day1';
        let currentRoadmap = 'Retail'; // Mặc định là Retail [1]
        let currentRandomScenario = null;

        // Cẩm nang dự phòng offline phòng khi kết nối API lỗi [1]
        const fallbackScenarios = {
            day1: [
                { id: 1, type: "morning", roadmap: "Retail", title: "Tình huống 1: Shop thời trang online & Do dự gia hạn vì tự quản lý ship qua app ngoài", question: 'Khách hàng kinh doanh quần áo online chuẩn bị hết hạn hợp đồng bảo: "Em ơi, giờ chị quét QR ngân hàng cá nhân và tự lên đơn trên app Giao Hàng Tiết Kiệm cũng nhanh, đâu cần qua KiotViet làm gì cho tốn tiền gia hạn hàng năm." Em hãy thuyết phục khách gia hạn.' }
            ],
            day2: [],
            day3: []
        };

        // Tự động tải cẩm nang tình huống từ Google Sheet ngay khi mở trang [1]
        window.onload = function() {
            loadScenariosFromSheet();
        };

        // Hàm lấy danh sách tình huống từ API Google Sheet [1]
        function loadScenariosFromSheet() {
            const box = document.getElementById('random-scenario-box');
            box.innerHTML = `
                <div class="text-center py-8 text-slate-400">
                    <i class="fa-solid fa-spinner animate-spin text-xl text-[#166def] block mb-2"></i>
                    Đang tải danh sách tình huống...
                </div>
            `;

            fetch(`${API_URL}?token=${SECURITY_TOKEN}&action=getScenarios`)
            .then(res => res.json())
            .then(response => {
                if (response.status === "success" && response.data && response.data.length > 0) {
                    scenariosData = { day1: [], day2: [], day3: [] };
                    
                    response.data.forEach(item => {
                        // Tự động bỏ qua dòng tiêu đề lặp lại [1]
                        if (
                            !item.Day || 
                            item.Day.toString().trim().toLowerCase() === "day" || 
                            item.Title.toString().trim().toLowerCase() === "title"
                        ) {
                            return; 
                        }

                        const dayKey = item.Day.toString().trim(); // day1, day2, day3
                        if (scenariosData[dayKey]) {
                            scenariosData[dayKey].push({
                                id: item.id || Math.random(),
                                type: item.Type ? item.Type.toString().trim() : "",
                                title: item.Title,
                                question: item.Question,
                                roadmap: item.Roadmap ? item.Roadmap.toString().trim() : "" // Gắn nhãn lộ trình [1]
                            });
                        }
                    });
                    
                    switchRoadmap('Retail');
                } else {
                    useFallbackData("Lỗi cấu trúc hoặc tệp rỗng. Kích hoạt chế độ dự phòng.");
                }
            })
            .catch(err => {
                console.warn("API load scenarios failed, loading offline handbook:", err);
                useFallbackData("Lỗi kết nối. Kích hoạt cẩm nang offline.");
            });
        }

        // Kích hoạt cẩm nang dự phòng offline [1]
        function useFallbackData(logMessage) {
            scenariosData = fallbackScenarios;
            switchRoadmap('Retail');
            console.info(logMessage);
        }

        // Quy tắc ngắt câu tự động kết xuất văn bản (Hết câu ngắt dòng + chèn 1 dòng trắng)
        // Bổ sung Negative Lookbehind để bỏ qua các số thứ tự 1. 2. 3. không ngắt dòng [1]
        function formatSentences(text) {
            if (!text) return "";
            const sentences = text.split(/(?<!\b\d+\.)(?<=[.?!])\s+/);
            return sentences
                .map(s => s.trim())
                .filter(s => s.length > 0)
                .join('<br><br>');
        }

        // Chuyển đổi Lộ trình học (Retail <-> FNB) [1]
        function switchRoadmap(roadmap) {
            currentRoadmap = roadmap;
            
            const retailBtn = document.getElementById('roadmap-Retail');
            const fnbBtn = document.getElementById('roadmap-FNB');

            if (roadmap === 'Retail') {
                retailBtn.className = "flex-1 py-3 text-xs font-black rounded-xl transition-all bg-white text-[#166def] shadow-sm flex items-center justify-center gap-2";
                fnbBtn.className = "flex-1 py-3 text-xs font-black rounded-xl text-slate-600 transition-all flex items-center justify-center gap-2";
            } else {
                retailBtn.className = "flex-1 py-3 text-xs font-black rounded-xl text-slate-600 transition-all flex items-center justify-center gap-2";
                fnbBtn.className = "flex-1 py-3 text-xs font-black rounded-xl transition-all bg-white text-[#166def] shadow-sm flex items-center justify-center gap-2";
            }

            // Đồng bộ tải lại danh sách của ngày hiện tại theo lộ trình mới
            switchSubTab(currentDay);
        }

        // Chuyển đổi Ngày học [1]
        function switchSubTab(day) {
            currentDay = day;
            const tabs = ['day1', 'day2', 'day3'];
            const blob1 = document.getElementById('blob-1');
            const blob2 = document.getElementById('blob-2');

            // Cập nhật hiệu ứng glow góc nền
            const bgGlows = {
                day1: ["rgba(22, 109, 239, 0.08)", "rgba(16, 185, 129, 0.08)"],
                day2: ["rgba(249, 115, 22, 0.08)", "rgba(22, 109, 239, 0.08)"],
                day3: ["rgba(16, 185, 129, 0.08)", "rgba(249, 115, 22, 0.08)"]
            };

            if (blob1 && blob2 && bgGlows[day]) {
                blob1.style.background = bgGlows[day][0];
                blob2.style.background = bgGlows[day][1];
            }
            
            tabs.forEach(item => {
                const button = document.getElementById(`sub-tab-${item}`);
                if (button) {
                    if (item === day) {
                        button.classList.add('bg-white', 'text-[#166def]', 'shadow-sm');
                        button.classList.remove('text-slate-600');
                    } else {
                        button.classList.remove('bg-white', 'text-[#166def]', 'shadow-sm');
                        button.classList.add('text-slate-600');
                    }
                }
            });

            // Đồng bộ dữ liệu Header
            const headerIcon = document.getElementById('session-header-icon');
            const headerTitle = document.getElementById('session-header-title');
            const headerDesc = document.getElementById('session-header-desc');

            if (day === 'day1') {
                headerIcon.innerHTML = '<i class="fa-solid fa-store"></i>';
                headerTitle.textContent = "PHIÊN 1: KIẾN THỨC BÁN LẺ NỀN TẢNG";
                headerDesc.textContent = "Các tính năng phần mềm bán hàng cơ bản";
            } else if (day === 'day2') {
                headerIcon.innerHTML = '<i class="fa-solid fa-cash-register"></i>';
                headerTitle.textContent = "PHIÊN 2: BÁN HÀNG NÂNG CAO & QUẢN TRỊ ĐA KÊNH";
                headerDesc.textContent = "Các tính năng phần mềm bán hàng cơ bản";
            } else if (day === 'day3') {
                headerIcon.innerHTML = '<i class="fa-solid fa-calculator"></i>';
                headerTitle.textContent = "PHIÊN 3: PHÁP LÝ THUẾ & KẾ TOÁN HỘ KINH DOANH";
                headerDesc.textContent = "Xuất hóa đơn từ máy tính tiền, hoàn thiện Sổ kế toán & Tờ khai thuế";
            }

            // 1. Tự động chọn 1 tình huống ngẫu nhiên
            triggerRandomScenario();

            // 2. Đồng bộ danh sách các tình huống khác bên dưới (mặc định ẩn)
            renderAllScenarios(day);
            hideAllScenariosList();
        }

        // Chọn ngẫu nhiên tình huống ôn luyện (Đã gỡ hoàn toàn Kỳ vọng đáp án) [1]
        function triggerRandomScenario() {
            const list = scenariosData[currentDay] 
                ? scenariosData[currentDay].filter(item => item.roadmap === currentRoadmap) 
                : [];

            const box = document.getElementById('random-scenario-box');

            if (!list || list.length === 0) {
                box.innerHTML = `
                    <p class="text-xs text-slate-400 py-6 text-center bg-white border border-dashed rounded-3xl">Lộ trình này chưa có dữ liệu tình huống ôn tập cho ngày hiện tại.</p>
                `;
                return;
            }

            const randomIndex = Math.floor(Math.random() * list.length);
            currentRandomScenario = list[randomIndex];

            const isMorning = currentRandomScenario.type === 'morning';
            const colorClass = isMorning ? 'bg-emerald-50 border-emerald-200 text-emerald-950' : 'bg-purple-50 border-purple-200 text-purple-950';
            const icon = isMorning ? '<i class="fa-solid fa-sun text-emerald-600"></i>' : '<i class="fa-solid fa-moon text-purple-600"></i>';
            const typeLabel = isMorning ? 'Học Phần Sáng' : 'Học Phần Chiều';

            box.innerHTML = `
                <div class="border-2 border-dashed border-[#166def]/30 rounded-3xl p-1 bg-white animate-fade">
                    <div class="${colorClass} rounded-2xl p-5 shadow-sm space-y-3">
                        <div class="flex items-center justify-between border-b pb-2 border-current/10">
                            <span class="text-xs font-black tracking-widest uppercase flex items-center gap-1.5">
                                ${icon} ${typeLabel} - TÌNH HUỐNG ÔN TẬP
                            </span>
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-white/70 border border-current/10">Random Selected</span>
                        </div>
                        <h4 class="font-extrabold text-sm text-slate-800">${escapeHtml(currentRandomScenario.title)}</h4>
                        <div class="text-xs space-y-3 pt-1">
                            <div class="leading-relaxed text-slate-600"><strong>Yêu cầu tư vấn:</strong> <p class="mt-1.5">${formatSentences(escapeHtml(currentRandomScenario.question))}</p></div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Kết xuất toàn bộ danh sách các tình huống lưu trữ khác (Đã gỡ hoàn toàn Kỳ vọng đáp án) [1]
        function renderAllScenarios(day) {
            const container = document.getElementById('all-scenarios-list');
            const list = scenariosData[day] 
                ? scenariosData[day].filter(item => item.roadmap === currentRoadmap) 
                : [];

            if (!list || list.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 py-4 text-center">Chưa có dữ liệu tình huống ôn tập nào khác.</p>`;
                return;
            }

            const morningTitle = `
                <div class="relative flex items-center justify-center my-6">
                    <div class="absolute inset-0 flex items-center" aria-hidden="true"><div class="w-full border-t border-slate-200"></div></div>
                    <div class="relative bg-emerald-50 border border-emerald-200 px-6 py-2 rounded-full shadow-sm text-center">
                        <span class="text-xs font-black text-emerald-700 tracking-wider uppercase"><i class="fa-solid fa-sun mr-1.5"></i> HỌC PHẦN SÁNG</span>
                    </div>
                </div>`;

            const afternoonTitle = `
                <div class="relative flex items-center justify-center my-6">
                    <div class="absolute inset-0 flex items-center" aria-hidden="true"><div class="w-full border-t border-slate-200"></div></div>
                    <div class="relative bg-purple-50 border border-purple-200 px-6 py-2 rounded-full shadow-sm text-center">
                        <span class="text-xs font-black text-purple-700 tracking-wider uppercase"><i class="fa-solid fa-moon mr-1.5"></i> HỌC PHẦN CHIỀU</span>
                    </div>
                </div>`;

            const morningItems = list.filter(item => item.type === 'morning');
            const afternoonItems = list.filter(item => item.type === 'afternoon');

            let htmlContent = "";

            if (morningItems.length > 0) {
                htmlContent += morningTitle;
                htmlContent += `<div class="space-y-4">` + morningItems.map(item => `
                    <details name="scenarios-${day}" class="group border border-emerald-100 rounded-2xl bg-emerald-50/50 p-4 transition-all duration-200 hover:bg-emerald-50">
                        <summary class="font-bold text-xs cursor-pointer list-none flex justify-between items-center">
                            <span class="flex items-center gap-2.5"><i class="fa-solid fa-sun text-emerald-600"></i> ${escapeHtml(item.title)}</span>
                            <span class="transition group-open:rotate-180 text-slate-400"><i class="fa-solid fa-chevron-down text-[10px]"></i></span>
                        </summary>
                        <div class="mt-4 text-xs space-y-3 border-t pt-3 border-current/10">
                            <div class="leading-relaxed text-slate-600"><strong>Tình huống:</strong> <p class="mt-1.5">${formatSentences(escapeHtml(item.question))}</p></div>
                        </div>
                    </details>
                `).join('') + `</div>`;
            }

            if (afternoonItems.length > 0) {
                htmlContent += afternoonTitle;
                htmlContent += `<div class="space-y-4">` + afternoonItems.map(item => `
                    <details name="scenarios-${day}" class="group border border-purple-100 rounded-2xl bg-purple-50/50 p-4 transition-all duration-200 hover:bg-purple-50">
                        <summary class="font-bold text-xs cursor-pointer list-none flex justify-between items-center">
                            <span class="flex items-center gap-2.5"><i class="fa-solid fa-moon text-purple-600"></i> ${escapeHtml(item.title)}</span>
                            <span class="transition group-open:rotate-180 text-slate-400"><i class="fa-solid fa-chevron-down text-[10px]"></i></span>
                        </summary>
                        <div class="mt-4 text-xs space-y-3 border-t pt-3 border-current/10">
                            <div class="leading-relaxed text-slate-600"><strong>Tình huống:</strong> <p class="mt-1.5">${formatSentences(escapeHtml(item.question))}</p></div>
                        </div>
                    </details>
                `).join('') + `</div>`;
            }

            container.innerHTML = htmlContent;
        }

        // Ẩn danh sách lưu trữ tình huống khác
        function hideAllScenariosList() {
            const list = document.getElementById('all-scenarios-list');
            const btn = document.getElementById('toggle-list-btn');
            list.classList.add('hidden');
            btn.innerHTML = '<i class="fa-solid fa-eye"></i> Xem danh sách tất cả tình huống';
        }

        // Bật/tắt ẩn hiện danh sách tình huống lưu trữ [1]
        function toggleAllScenarios() {
            const list = document.getElementById('all-scenarios-list');
            const btn = document.getElementById('toggle-list-btn');

            if (list.classList.contains('hidden')) {
                list.classList.remove('hidden');
                btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i> Ẩn các tình huống lưu trữ';
            } else {
                list.classList.add('hidden');
                btn.innerHTML = '<i class="fa-solid fa-eye"></i> Xem danh sách tất cả tình huống';
            }
        }

        function escapeHtml(string) {
            if (!string) return "";
            return String(string)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    </script>
